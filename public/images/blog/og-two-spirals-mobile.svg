      <circle cx="31" cy="18" r="5" fill="url(#db)"/><circle cx="31" cy="18" r="3" fill="#6494be"/>
      <circle cx="-31" cy="18" r="5" fill="url(#db)"/><circle cx="-31" cy="18" r="3" fill="#6494be"/>
      <circle cx="55" cy="-32" r="6" fill="url(#db)"/><circle cx="55" cy="-32" r="3" fill="#6494be"/>
      <circle cx="-37" cy="-53" r="6" fill="#ff6b9d" opacity="0.9"/>
      <circle cx="-62" cy="16" r="6" fill="url(#db)"/><circle cx="-62" cy="16" r="3" fill="#6494be"/>
      <circle cx="18" cy="62" r="6" fill="url(#db)"/><circle cx="18" cy="62" r="3" fill="#6494be"/>
      <circle cx="55" cy="32" r="6" fill="#ff6b9d" opacity="0.9"/>
      <circle cx="0" cy="-90" r="6" fill="#50fa7b"/>
      <circle cx="78" cy="-46" r="6" fill="#50fa7b"/>
      <circle cx="92" cy="9" r="6" fill="#50fa7b"/>
      <circle cx="78" cy="64" r="6" fill="#50fa7b"/>
      <circle cx="-55" cy="75" r="6" fill="#50fa7b"/>
      <circle cx="-92" cy="0" r="6" fill="#50fa7b"/>
      <circle cx="-78" cy="-54" r="6" fill="url(#db)"/><circle cx="-78" cy="-54" r="3" fill="#6494be"/>
      <circle cx="28" cy="-87" r="6" fill="url(#db)"/><circle cx="28" cy="-87" r="3" fill="#6494be"/>
      <circle cx="14" cy="-118" r="5" fill="#50fa7b"/>
      <circle cx="87" cy="-83" r="5" fill="#50fa7b"/>
      <circle cx="118" cy="23" r="5" fill="#50fa7b"/>
      <circle cx="87" cy="83" r="5" fill="#50fa7b"/>
      <circle cx="-28" cy="116" r="5" fill="#50fa7b"/>
      <!-- seeds -->
      <circle cx="-88" cy="81" r="8" fill="url(#dy)"/>
      <circle cx="-88" cy="81" r="5" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="-118" cy="-23" r="8" fill="url(#dy)"/>
      <circle cx="-118" cy="-23" r="5" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="-55" cy="-106" r="8" fill="url(#dy)"/>
      <circle cx="-55" cy="-106" r="5" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="60" cy="-103" r="8" fill="url(#dy)"/>
      <circle cx="60" cy="-103" r="5" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
