<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Two Spirals — process and concept (mobile).">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="95%">
      <stop offset="0%" stop-color="#15202e"/>
      <stop offset="100%" stop-color="#060a0f"/>
    </radialGradient>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="do" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="db" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
