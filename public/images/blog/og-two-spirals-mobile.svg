  <!-- Brand -->
  <text x="100" y="1005" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="1005" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 11px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
