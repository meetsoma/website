      <circle cx="71" cy="-71" r="7" fill="url(#db)"/><circle cx="71" cy="-71" r="4" fill="#6494be"/>
      <circle cx="45" cy="0" r="9" fill="url(#do)"/><circle cx="45" cy="0" r="5" fill="#f0883e"/>
      <circle cx="-23" cy="39" r="9" fill="url(#do)"/><circle cx="-23" cy="39" r="5" fill="#f0883e"/>
      <circle cx="-23" cy="-39" r="9" fill="url(#do)"/><circle cx="-23" cy="-39" r="5" fill="#f0883e"/>
      <circle cx="71" cy="71" r="7" fill="url(#db)"/><circle cx="71" cy="71" r="4" fill="#6494be"/>
      <circle cx="-71" cy="71" r="7" fill="url(#db)"/><circle cx="-71" cy="71" r="4" fill="#6494be"/>
      <path d="M 71,71 Q 110,0 45,0" fill="none" stroke="#f0883e" stroke-width="1.3" stroke-dasharray="4,3" opacity="0.6"/>
    </g>
    <circle r="16" fill="url(#cg)"/>
    <text y="5" text-anchor="middle" style="font-family: serif; font-size: 14px; fill: #00e5ff; opacity: 0.75;">σ</text>
