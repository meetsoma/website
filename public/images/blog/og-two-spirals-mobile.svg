  <text x="300" y="575" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 5px; font-weight: 600;">PROCESS</text>
  <text x="300" y="600" text-anchor="middle" style="font-family: Georgia, serif; font-size: 16px; fill: #c9d1d9; opacity: 0.7; font-style: italic;">7 phases · one session</text>

