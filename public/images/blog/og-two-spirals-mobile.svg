    <circle r="22" fill="url(#cg)"/>
    <text y="6" text-anchor="middle" style="font-family: serif; font-size: 18px; fill: #00e5ff; opacity: 0.85;">σῶμα</text>
  </g>
  <text x="300" y="945" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 5px; font-weight: 600;">CONCEPT</text>
