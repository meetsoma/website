<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="ui-serif, 'Iowan Old Style', Georgia, serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="900" height="460" fill="url(#bg)"/>

  <text x="450" y="40" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" letter-spacing="4" fill="#8b949e">F&#8239;O&#8239;R&#8239;T&#8239;Y &#8239;-&#8239; S&#8239;E&#8239;V&#8239;E&#8239;N &#160; S&#8239;E&#8239;S&#8239;S&#8239;I&#8239;O&#8239;N&#8239;S</text>

  <!-- y scale: 0..140 maps 360..80; x: sessions 1..47 maps 100..820 -->
  <line x1="100" y1="360" x2="820" y2="360" stroke="#30363d" stroke-width="1"/>
  <line x1="100" y1="360" x2="100" y2="80"   stroke="#30363d" stroke-width="1"/>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#6b7280">
    <line x1="100" y1="280" x2="820" y2="280" stroke="#1f242c" stroke-width="1"/>
    <text x="88" y="284" text-anchor="end">40</text>
    <line x1="100" y1="200" x2="820" y2="200" stroke="#1f242c" stroke-width="1"/>
    <text x="88" y="204" text-anchor="end">80</text>
    <line x1="100" y1="120" x2="820" y2="120" stroke="#1f242c" stroke-width="1"/>
    <text x="88" y="124" text-anchor="end">120</text>
    <text x="88" y="364" text-anchor="end">0</text>
  </g>

  <g font-family="ui-monospace, 'SF Mono', monospace" font-size="11" fill="#6b7280">
    <text x="100" y="380" text-anchor="middle">s 1</text>
    <text x="253" y="380" text-anchor="middle">s 10</text>
    <text x="406" y="380" text-anchor="middle">s 20</text>
    <text x="559" y="380" text-anchor="middle">s 30</text>
    <text x="712" y="380" text-anchor="middle">s 40</text>
    <text x="820" y="380" text-anchor="middle">s 47</text>
  </g>

  <!-- Line A: compiled runtime flat at 18 (y = 360 - (18/140)*280 = 360 - 36 = 324) -->
  <line x1="100" y1="324" x2="820" y2="324" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6,4"/>
  <circle cx="100" cy="324" r="4" fill="#58a6ff"/>
  <circle cx="820" cy="324" r="4" fill="#58a6ff"/>

  <!-- Line B: body/AMPS grows from 18 to 125 (y 324 to y = 360-(125/140)*280 = 360-250 = 110) -->
  <!-- Slight curve: early plateau, steeper middle, slight settle -->
  <path d="M 100,324 Q 180,316 253,300 T 406,240 T 559,170 T 712,130 L 820,110" fill="none" stroke="#f0b254" stroke-width="3"/>
  <circle cx="100" cy="324" r="4" fill="#f0b254"/>
  <circle cx="820" cy="110" r="4" fill="#f0b254"/>

  <!-- labels on endpoints -->
  <text x="95" y="318" text-anchor="end" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#f0b254">18</text>
  <text x="835" y="328" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#58a6ff">18</text>
  <text x="835" y="114" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#f0b254">125</text>

  <!-- Legend (two lines inline at right-top) -->
  <line x1="530" y1="85" x2="555" y2="85" stroke="#58a6ff" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="562" y="90" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#c9d1d9">compiled runtime (flat)</text>
  <line x1="530" y1="105" x2="555" y2="105" stroke="#f0b254" stroke-width="3"/>
  <text x="562" y="110" font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#c9d1d9">body + AMPS (grown)</text>

  <text x="450" y="430" text-anchor="middle" font-style="italic" font-size="14" fill="#8b949e">Same runtime. A body that grew around it.</text>
</svg>
