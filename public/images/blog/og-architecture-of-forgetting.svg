<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node-glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="path-fade-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#f0883e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="path-fade-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#6494be" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="path-fade-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dissolve-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#f0883e" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#30363d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
    <circle cx="17" cy="17" r="0.4" fill="#6494be" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══ CIRCUIT / NEURAL NETWORK — right side ═══ -->
  <g opacity="0.85">
    <!-- Horizontal traces -->
    <line x1="680" y1="160" x2="1150" y2="160" stroke="url(#path-fade-1)" stroke-width="1.5"/>
    <line x1="720" y1="240" x2="1100" y2="240" stroke="url(#path-fade-2)" stroke-width="1"/>
    <line x1="700" y1="320" x2="1180" y2="320" stroke="url(#path-fade-1)" stroke-width="1"/>
    <line x1="740" y1="400" x2="1060" y2="400" stroke="url(#path-fade-2)" stroke-width="1"/>
    <line x1="710" y1="480" x2="1120" y2="480" stroke="url(#path-fade-1)" stroke-width="1.5"/>

    <!-- Vertical traces -->
    <line x1="800" y1="120" x2="800" y2="530" stroke="url(#path-fade-v)" stroke-width="1"/>
    <line x1="920" y1="140" x2="920" y2="510" stroke="url(#path-fade-v)" stroke-width="1"/>
    <line x1="1040" y1="130" x2="1040" y2="490" stroke="url(#path-fade-v)" stroke-width="0.8"/>

    <!-- Diagonal connections -->
    <line x1="800" y1="160" x2="920" y2="240" stroke="#f0883e" stroke-width="1" opacity="0.2"/>
    <line x1="920" y1="240" x2="1040" y2="320" stroke="#6494be" stroke-width="1" opacity="0.15"/>
    <line x1="800" y1="320" x2="920" y2="400" stroke="#f0883e" stroke-width="1" opacity="0.2"/>
    <line x1="920" y1="400" x2="1040" y2="480" stroke="#6494be" stroke-width="1" opacity="0.15"/>
    <line x1="1040" y1="160" x2="920" y2="240" stroke="#f0883e" stroke-width="0.8" opacity="0.15"/>
    <line x1="800" y1="400" x2="920" y2="320" stroke="#6494be" stroke-width="0.8" opacity="0.12"/>
    <line x1="1040" y1="400" x2="920" y2="320" stroke="#f0883e" stroke-width="0.8" opacity="0.12"/>

    <!-- ═══ NODES — intersections ═══ -->
    <!-- Active nodes (orange — memories being formed) -->
    <circle cx="800" cy="160" r="18" fill="url(#node-glow)"/>
    <circle cx="800" cy="160" r="5" fill="#f0883e" opacity="0.9"/>
    <circle cx="800" cy="160" r="2" fill="#fff" opacity="0.6"/>

    <circle cx="920" cy="320" r="22" fill="url(#node-glow)"/>
    <circle cx="920" cy="320" r="6" fill="#f0883e" opacity="0.9"/>
    <circle cx="920" cy="320" r="2.5" fill="#fff" opacity="0.6"/>

    <circle cx="1040" cy="480" r="16" fill="url(#node-glow)"/>
    <circle cx="1040" cy="480" r="4.5" fill="#f0883e" opacity="0.8"/>
    <circle cx="1040" cy="480" r="2" fill="#fff" opacity="0.5"/>

    <!-- Stable nodes (blue — settled memories) -->
    <circle cx="920" cy="240" r="15" fill="url(#node-glow-blue)"/>
    <circle cx="920" cy="240" r="4.5" fill="#6494be" opacity="0.8"/>
    <circle cx="920" cy="240" r="2" fill="#fff" opacity="0.5"/>

    <circle cx="1040" cy="160" r="14" fill="url(#node-glow-blue)"/>
    <circle cx="1040" cy="160" r="4" fill="#6494be" opacity="0.7"/>
    <circle cx="1040" cy="160" r="1.5" fill="#fff" opacity="0.4"/>

    <circle cx="800" cy="400" r="16" fill="url(#node-glow-blue)"/>
    <circle cx="800" cy="400" r="4.5" fill="#6494be" opacity="0.8"/>
    <circle cx="800" cy="400" r="2" fill="#fff" opacity="0.5"/>

    <circle cx="1040" cy="320" r="13" fill="url(#node-glow-blue)"/>
    <circle cx="1040" cy="320" r="3.5" fill="#6494be" opacity="0.7"/>
    <circle cx="1040" cy="320" r="1.5" fill="#fff" opacity="0.4"/>

    <!-- Fading nodes (dimming — memories dissolving) -->
    <circle cx="800" cy="480" r="12" fill="url(#node-glow)"/>
    <circle cx="800" cy="480" r="3.5" fill="#f0883e" opacity="0.3"/>

    <circle cx="920" cy="400" r="11" fill="url(#node-glow-blue)"/>
    <circle cx="920" cy="400" r="3" fill="#6494be" opacity="0.25"/>

    <circle cx="1040" cy="240" r="10" fill="url(#node-glow-blue)"/>
    <circle cx="1040" cy="240" r="2.5" fill="#6494be" opacity="0.2"/>

    <!-- Ghost nodes (almost gone) -->
    <circle cx="1120" cy="200" r="2" fill="#6494be" opacity="0.12"/>
    <circle cx="1100" cy="360" r="1.5" fill="#f0883e" opacity="0.1"/>
    <circle cx="1140" cy="440" r="1.8" fill="#6494be" opacity="0.08"/>
    <circle cx="1080" cy="130" r="1.2" fill="#f0883e" opacity="0.1"/>
  </g>

  <!-- ═══ MAIN TEXT ═══ -->
  <text x="55" y="195" style="font-family: Georgia, 'Times New Roman', serif; font-size: 78px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">The Architecture</text>
  <text x="55" y="295" style="font-family: Georgia, 'Times New Roman', serif; font-size: 78px; fill: #f0883e; font-weight: 700; letter-spacing: -2px;">of Forgetting</text>

  <!-- Subtitle -->
  <text x="58" y="360" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 20px; fill: #6494be; opacity: 0.65; letter-spacing: 2px;">398,000 lines of Claude Code</text>

  <!-- Code fragment — memory extraction hint -->
  <g opacity="0.35">
    <text x="58" y="430" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; fill: #6e7681;">extractMemories.ts</text>
    <text x="58" y="452" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; fill: #6e7681;">autoDream.ts</text>
    <text x="58" y="474" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; fill: #6e7681;">verificationAgent.ts</text>
    <text x="58" y="496" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; fill: #6e7681;">companion.ts</text>
  </g>

  <!-- ═══ BRAND BAR ═══ -->
  <line x1="55" y1="565" x2="620" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="55" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="620" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
