<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="spiral-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .phase-label { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; fill: #c9d1d9; }
    .phase-num { font-family: 'SF Mono', monospace; font-size: 9px; fill: #6494be; letter-spacing: 1.5px; }
    .inner-label { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #8bb9e0; font-style: italic; }
    .arrow { stroke: #6494be; stroke-width: 1.5; fill: none; }
    .arrow-head { fill: #6494be; }
    .inner-box { stroke: #3a6890; stroke-width: 1; stroke-dasharray: 5,4; fill: rgba(100,148,190,0.04); rx: 12; }
    .phase-box { stroke: #30363d; stroke-width: 1; fill: rgba(22,27,34,0.85); rx: 8; }
    .phase-box-inner { stroke: #6494be; stroke-width: 1.5; fill: rgba(100,148,190,0.06); rx: 8; }
    .feedback { stroke: #f0883e; stroke-width: 1.5; fill: none; stroke-dasharray: 6,4; }
    .feedback-head { fill: #f0883e; }
    .loop-arrow { stroke: #6494be; stroke-width: 1; fill: none; stroke-dasharray: 3,3; opacity: 0.6; }
    .title-text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 42px; fill: #c9d1d9; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle-text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; fill: #6e7681; }
    .brand { font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; opacity: 0.8; letter-spacing: 2px; }
    .sigma { font-family: 'Times New Roman', serif; font-size: 28px; fill: #6494be; opacity: 0.6; }
  </style>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <rect width="1200" height="630" fill="url(#spiral-glow)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#6494be" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Title area (left side) -->
  <text x="80" y="120" class="title-text">The Spiral</text>
  <text x="80" y="155" class="subtitle-text">Why our dev cycle isn't a pipeline</text>

  <!-- Brand -->
  <text x="80" y="590" class="brand">SOMA</text>
  <text x="1120" y="590" text-anchor="end" class="brand">soma.gravicity.ai</text>
  <text x="1140" y="555" text-anchor="end" class="sigma">σ</text>

  <!-- ═══ SPIRAL DIAGRAM (shifted right and down) ═══ -->

  <!-- Phase 0: Orient -->
  <rect x="80" y="210" width="120" height="48" class="phase-box"/>
  <text x="140" y="230" text-anchor="middle" class="phase-num">PHASE 0</text>
  <text x="140" y="246" text-anchor="middle" class="phase-label">Orient</text>

  <!-- Arrow 0→1 -->
  <line x1="200" y1="234" x2="235" y2="234" class="arrow"/>
  <polygon points="235,229 247,234 235,239" class="arrow-head"/>

  <!-- Phase 1: Plan -->
  <rect x="247" y="210" width="120" height="48" class="phase-box"/>
  <text x="307" y="230" text-anchor="middle" class="phase-num">PHASE 1</text>
  <text x="307" y="246" text-anchor="middle" class="phase-label">Plan</text>

  <!-- Arrow 1→inner -->
  <line x1="307" y1="258" x2="307" y2="285" class="arrow"/>
  <polygon points="302,285 307,297 312,285" class="arrow-head"/>

  <!-- Inner Spiral Box -->
  <rect x="140" y="297" width="360" height="185" class="inner-box"/>
  <text x="320" y="316" text-anchor="middle" class="inner-label">inner spiral — repeats per feature</text>

  <!-- Phase 2: Build -->
  <rect x="168" y="332" width="115" height="48" class="phase-box-inner"/>
  <text x="225" y="352" text-anchor="middle" class="phase-num">PHASE 2</text>
  <text x="225" y="368" text-anchor="middle" class="phase-label">Build</text>

  <!-- Arrow 2→3 -->
  <line x1="283" y1="356" x2="318" y2="356" class="arrow"/>
  <polygon points="318,351 330,356 318,361" class="arrow-head"/>

  <!-- Phase 3: Verify -->
  <rect x="330" y="332" width="115" height="48" class="phase-box-inner"/>
  <text x="387" y="352" text-anchor="middle" class="phase-num">PHASE 3</text>
  <text x="387" y="368" text-anchor="middle" class="phase-label">Verify</text>

  <!-- Arrow 3→4 -->
  <line x1="387" y1="380" x2="387" y2="408" class="arrow"/>
  <polygon points="382,408 387,420 392,408" class="arrow-head"/>

  <!-- Phase 4: Ship -->
  <rect x="262" y="420" width="115" height="48" class="phase-box-inner"/>
  <text x="320" y="440" text-anchor="middle" class="phase-num">PHASE 4</text>
  <text x="320" y="456" text-anchor="middle" class="phase-label">Ship</text>

  <!-- Loop arrow 4→2 -->
  <path d="M 262,448 L 150,448 L 150,356 L 168,356" class="loop-arrow"/>
  <polygon points="163,351 173,356 163,361" class="arrow-head" opacity="0.5"/>

  <!-- Arrow out of spiral →5 -->
  <line x1="500" y1="356" x2="550" y2="356" class="arrow"/>
  <polygon points="550,351 562,356 550,361" class="arrow-head"/>

  <!-- Phase 5: Document -->
  <rect x="562" y="210" width="130" height="48" class="phase-box"/>
  <text x="627" y="230" text-anchor="middle" class="phase-num">PHASE 5</text>
  <text x="627" y="246" text-anchor="middle" class="phase-label">Document</text>

  <!-- Arrow 5→6 -->
  <line x1="627" y1="258" x2="627" y2="295" class="arrow"/>
  <polygon points="622,295 627,307 632,295" class="arrow-head"/>

  <!-- Phase 6: Audit -->
  <rect x="562" y="307" width="130" height="48" class="phase-box"/>
  <text x="627" y="327" text-anchor="middle" class="phase-num">PHASE 6</text>
  <text x="627" y="343" text-anchor="middle" class="phase-label">Audit</text>

  <!-- Feedback arrow 6→Build -->
  <path d="M 562,335 L 530,335 L 530,500 L 150,500 L 150,470" class="feedback"/>
  <polygon points="145,470 150,458 155,470" class="feedback-head"/>
  <text x="340" y="517" text-anchor="middle" class="inner-label" style="fill: #f0883e; font-size: 10px;">gaps found → back to Build</text>

  <!-- Arrow 6→7 -->
  <line x1="692" y1="330" x2="740" y2="330" class="arrow"/>
  <polygon points="740,325 752,330 740,335" class="arrow-head"/>

  <!-- Phase 7: Reflect -->
  <rect x="752" y="307" width="130" height="48" class="phase-box"/>
  <text x="817" y="327" text-anchor="middle" class="phase-num">PHASE 7</text>
  <text x="817" y="343" text-anchor="middle" class="phase-label">Reflect</text>

  <!-- Decorative: phase count badges on right -->
  <g transform="translate(940, 200)">
    <rect x="0" y="0" width="180" height="240" rx="12" stroke="#30363d" stroke-width="1" fill="rgba(22,27,34,0.5)"/>
    <text x="90" y="30" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 11px; fill: #6e7681; letter-spacing: 1px;">THE CYCLE</text>
    <text x="90" y="65" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 36px; fill: #6494be; font-weight: 700;">7</text>
    <text x="90" y="85" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 12px; fill: #6e7681;">phases</text>
    <line x1="30" y1="100" x2="150" y2="100" stroke="#30363d" stroke-width="1"/>
    <text x="90" y="125" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 12px; fill: #c9d1d9;">Build → Verify → Ship</text>
    <text x="90" y="145" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 11px; fill: #6e7681;">repeats per feature</text>
    <line x1="30" y1="160" x2="150" y2="160" stroke="#30363d" stroke-width="1"/>
    <text x="90" y="185" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 12px; fill: #f0883e;">Audit feeds back</text>
    <text x="90" y="205" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 11px; fill: #6e7681;">gaps → Build again</text>
    <text x="90" y="230" text-anchor="middle" style="font-family: -apple-system, sans-serif; font-size: 11px; fill: #6e7681; font-style: italic;">not a pipeline — a spiral</text>
  </g>
</svg>
