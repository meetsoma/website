<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Introducing Soma — an agent that remembers (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15202e"/>
      <stop offset="100%" stop-color="#080c13"/>
    </radialGradient>
    <radialGradient id="mascot-g" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9fb8d4"/>
      <stop offset="100%" stop-color="#4a6f98"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>

  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 8px; opacity: 0.8; font-weight: 600;">INTRODUCING</text>

  <text x="300" y="200" text-anchor="middle" style="font-family: Georgia, serif; font-size: 110px; fill: #e4eaf4; font-weight: 700; letter-spacing: -3px;">Soma.</text>

  <!-- Mascot with sunglasses -->
  <g transform="translate(180, 290)">
    <circle cx="120" cy="120" r="115" fill="url(#mascot-g)"/>
    <!-- Sunglasses -->
    <rect x="36" y="100" width="76" height="42" rx="7" fill="#0e1a26" stroke="#0e1a26" stroke-width="1"/>
    <rect x="128" y="100" width="76" height="42" rx="7" fill="#0e1a26" stroke="#0e1a26" stroke-width="1"/>
    <line x1="112" y1="118" x2="128" y2="118" stroke="#0e1a26" stroke-width="4"/>
    <line x1="0" y1="114" x2="38" y2="118" stroke="#0e1a26" stroke-width="3"/>
    <line x1="202" y1="118" x2="240" y2="114" stroke="#0e1a26" stroke-width="3"/>
    <!-- Reflection glints -->
    <ellipse cx="55" cy="112" rx="8" ry="4" fill="#2a3647" opacity="0.9"/>
    <ellipse cx="147" cy="112" rx="8" ry="4" fill="#2a3647" opacity="0.9"/>
    <!-- Smile -->
    <path d="M 75 172 Q 120 200 165 172" fill="none" stroke="#f0f5fa" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Tagline -->
  <text x="300" y="650" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1px;">An agent that</text>
  <text x="300" y="720" text-anchor="middle" style="font-family: Georgia, serif; font-size: 58px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -1.5px;">remembers.</text>

  <!-- Subtext -->
  <text x="300" y="820" text-anchor="middle" style="font-family: Georgia, serif; font-size: 20px; fill: #c9d1d9; font-style: italic; opacity: 0.8;">Memory that persists.</text>
  <text x="300" y="850" text-anchor="middle" style="font-family: Georgia, serif; font-size: 20px; fill: #c9d1d9; font-style: italic; opacity: 0.8;">Identity that grows.</text>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
