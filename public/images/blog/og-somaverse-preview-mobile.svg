<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#6494be" opacity="0.08"/>
    </pattern>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c866"/>
      <stop offset="1" stop-color="#d18f2a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cb2d4"/>
      <stop offset="1" stop-color="#5086aa"/>
    </linearGradient>
  </defs>

  <rect width="600" height="1020" fill="url(#bg)"/>
  <rect width="600" height="1020" fill="url(#dots)"/>

  <text x="300" y="100" text-anchor="middle" fill="#6494be"
        font-family="'SF Mono', monospace" font-size="14" letter-spacing="5"
        opacity="0.85">PRE-LAUNCH</text>

  <!-- σ-in-ring icon -->
  <g transform="translate(300, 260)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#ring)" stroke-width="5"/>
    <text x="0" y="36" text-anchor="middle" fill="url(#gold)" font-size="140" font-weight="800"
          font-family="Manrope, system-ui, sans-serif">σ</text>
  </g>

  <!-- Wordmark -->
  <text x="300" y="460" text-anchor="middle" fill="#e4eaf4" font-size="74" font-weight="700" letter-spacing="-1.5"
        font-family="Manrope, system-ui, sans-serif">
    S<tspan fill="url(#gold)">σ</tspan>maverse
  </text>

  <!-- Hero phrase -->
  <text x="300" y="570" text-anchor="middle" fill="#e4eaf4" font-size="50" font-weight="700" letter-spacing="-1">Where AI</text>
  <text x="300" y="630" text-anchor="middle" fill="url(#gold)" font-size="50" font-weight="700" font-style="italic" letter-spacing="-1">agents live.</text>

  <text x="300" y="700" text-anchor="middle" fill="#9dafc4" font-size="22" font-style="italic">A tiling workspace</text>
  <text x="300" y="730" text-anchor="middle" fill="#9dafc4" font-size="22" font-style="italic">with eyes and hands.</text>

  <!-- Feature chips, stacked -->
  <g font-family="'SF Mono', monospace" font-size="17">
    <rect x="80" y="790" width="440" height="48" rx="8"
          fill="rgba(124,178,212,0.12)" stroke="rgba(124,178,212,0.4)" stroke-width="1"/>
    <text x="300" y="820" text-anchor="middle" fill="#8bb9e0">see the screen · drive the browser</text>

    <rect x="80" y="850" width="440" height="48" rx="8"
          fill="rgba(240,200,102,0.15)" stroke="rgba(240,200,102,0.5)" stroke-width="1"/>
    <text x="300" y="880" text-anchor="middle" fill="#f0c866">own the terminal · pair with your agent</text>
  </g>

  <line x1="80" y1="950" x2="520" y2="950" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="982" fill="#6494be" font-family="'SF Mono', monospace" font-size="13" letter-spacing="3" opacity="0.85">SOMA</text>
  <text x="520" y="982" fill="#6e7681" font-family="'SF Mono', monospace" font-size="12" text-anchor="end" opacity="0.7">soma.gravicity.ai</text>
</svg>
