<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="The Bridge Pattern — agent and world connected via websocket relay (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#15202e"/>
      <stop offset="100%" stop-color="#080c13"/>
    </radialGradient>
    <radialGradient id="agent-g" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#9fb8d4"/>
      <stop offset="100%" stop-color="#4a6f98"/>
    </radialGradient>
    <radialGradient id="world-g" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f5bc8a"/>
      <stop offset="100%" stop-color="#c97135"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>

  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 8px; opacity: 0.8; font-weight: 600;">ARCHITECTURE</text>

  <!-- Hero title (top) -->
  <text x="300" y="195" text-anchor="middle" style="font-family: Georgia, serif; font-size: 66px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">The Bridge</text>
  <text x="300" y="265" text-anchor="middle" style="font-family: Georgia, serif; font-size: 66px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">Pattern.</text>

  <!-- Agent circle (upper) -->
  <g transform="translate(180, 370)">
    <circle cx="120" cy="110" r="105" fill="url(#agent-g)"/>
    <text x="120" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#0e1a26" font-weight="700">agent</text>
    <text x="120" y="138" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" fill="#0e1a26" opacity="0.8">local</text>
  </g>

  <!-- Relay channel (middle) -->
  <g transform="translate(0, 600)">
    <text x="300" y="25" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#c9d1d9" letter-spacing="5" opacity="0.75">WEBSOCKET RELAY</text>
    <!-- Vertical relay bars like signal -->
    <line x1="220" y1="48" x2="220" y2="84" stroke="#c9d1d9" stroke-width="2" opacity="0.45"/>
    <line x1="255" y1="42" x2="255" y2="90" stroke="#c9d1d9" stroke-width="2" opacity="0.55"/>
    <line x1="290" y1="35" x2="290" y2="97" stroke="#c9d1d9" stroke-width="2" opacity="0.7"/>
    <line x1="325" y1="42" x2="325" y2="90" stroke="#c9d1d9" stroke-width="2" opacity="0.55"/>
    <line x1="360" y1="48" x2="360" y2="84" stroke="#c9d1d9" stroke-width="2" opacity="0.45"/>
    <!-- Direction arrows -->
    <polygon points="275,65 290,60 290,70" fill="#f0883e"/>
    <polygon points="325,65 310,60 310,70" fill="#6494be"/>
    <!-- Dashed connection line (agent → world) -->
    <path d="M 300 48 L 300 110" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.5" fill="none"/>
  </g>

  <!-- World circle (lower) — slightly smaller to leave room for subtitle -->
  <g transform="translate(195, 730)">
    <circle cx="105" cy="75" r="72" fill="url(#world-g)"/>
    <text x="105" y="72" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#0e1a26" font-weight="700">world</text>
    <text x="105" y="96" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#0e1a26" opacity="0.8">browser · fs · tty</text>
  </g>

  <!-- Subtitle — clear of world circle -->
  <text x="300" y="895" text-anchor="middle" style="font-family: Georgia, serif; font-size: 20px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">The relay became the platform.</text>

  <!-- Brand -->
  <line x1="100" y1="940" x2="500" y2="940" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="975" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="975" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
