<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Born on April 12 — v0.11.0 release on the creator's birthday (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <linearGradient id="cake-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a06a"/>
      <stop offset="100%" stop-color="#c26a2a"/>
    </linearGradient>
    <radialGradient id="flame-g" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="60%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="rgba(240,136,62,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>

  <!-- Confetti dots -->
  <g opacity="0.5">
    <circle cx="80" cy="140" r="4" fill="#6494be"/>
    <circle cx="160" cy="80" r="3" fill="#f0883e"/>
    <circle cx="500" cy="100" r="3.5" fill="#28c840"/>
    <circle cx="440" cy="160" r="3" fill="#f0a06a"/>
    <circle cx="120" cy="740" r="3" fill="#f0883e"/>
    <circle cx="480" cy="780" r="3" fill="#6494be"/>
    <circle cx="60" cy="820" r="2.5" fill="#28c840"/>
    <circle cx="540" cy="680" r="3" fill="#f0a06a"/>
  </g>

  <!-- Label -->
  <text x="300" y="100" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #f0883e; letter-spacing: 8px; opacity: 0.85; font-weight: 600;">APRIL 12 · 2026</text>

  <!-- Hero -->
  <text x="300" y="220" text-anchor="middle" style="font-family: Georgia, serif; font-size: 90px; fill: #e4eaf4; font-weight: 700; letter-spacing: -3px;">Born on</text>
  <text x="300" y="320" text-anchor="middle" style="font-family: Georgia, serif; font-size: 90px; fill: #f0883e; font-weight: 700; letter-spacing: -3px;">April 12.</text>

  <!-- Cake centered -->
  <g transform="translate(230, 400)">
    <!-- Cake body -->
    <rect x="0" y="80" width="140" height="140" rx="8" fill="url(#cake-g)" stroke="#c26a2a" stroke-width="2"/>
    <!-- Icing drip -->
    <path d="M 0 100 Q 30 110 50 100 Q 70 113 100 100 Q 120 110 140 100 L 140 80 L 0 80 Z" fill="#ffe27a" opacity="0.85"/>
    <!-- Candle -->
    <rect x="65" y="30" width="10" height="55" rx="2" fill="#e4eaf4"/>
    <!-- Flame -->
    <ellipse cx="70" cy="15" rx="16" ry="26" fill="url(#flame-g)"/>
    <ellipse cx="70" cy="8" rx="7" ry="12" fill="#ffe27a" opacity="0.9"/>
    <!-- Version inscribed -->
    <text x="70" y="165" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#fff" font-weight="700" letter-spacing="-1">v0.11.0</text>
    <text x="70" y="195" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="rgba(255,255,255,0.85)" letter-spacing="3">FIRST RELEASE</text>
  </g>

  <!-- Subtext -->
  <text x="300" y="790" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Distribution tiers. Pro scripts.</text>
  <text x="300" y="825" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">The open-source pledge.</text>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
