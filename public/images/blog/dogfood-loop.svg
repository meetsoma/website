<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(100, 148, 190, 0.7)"/>
    </marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0c866"/>
    </marker>
  </defs>

  <text x="450" y="34" text-anchor="middle" fill="#6a7380" font-size="12" letter-spacing="6">EAT  YOUR  OWN  MEMORY</text>

  <!-- Circular loop, 4 nodes arranged at cardinal points -->
  <!-- BUILD (top) -->
  <g transform="translate(450,115)">
    <rect x="-72" y="-30" width="144" height="60" rx="8" fill="rgba(100,148,190,0.1)" stroke="rgba(100,148,190,0.5)" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#c9d1d9" font-size="17" font-weight="600">BUILD</text>
    <text x="0" y="17" text-anchor="middle" fill="#8a94a6" font-size="11">muscles, scripts, plans</text>
  </g>

  <!-- USE (right) -->
  <g transform="translate(720,235)">
    <rect x="-72" y="-30" width="144" height="60" rx="8" fill="rgba(100,148,190,0.1)" stroke="rgba(100,148,190,0.5)" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#c9d1d9" font-size="17" font-weight="600">USE</text>
    <text x="0" y="17" text-anchor="middle" fill="#8a94a6" font-size="11">in next session</text>
  </g>

  <!-- FIND (bottom) -->
  <g transform="translate(450,355)">
    <rect x="-84" y="-30" width="168" height="60" rx="8" fill="rgba(240,136,62,0.12)" stroke="rgba(240,136,62,0.55)" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#c9d1d9" font-size="17" font-weight="600">FIND FRICTION</text>
    <text x="0" y="17" text-anchor="middle" fill="#8a94a6" font-size="11">what hurts to use?</text>
  </g>

  <!-- FIX (left) -->
  <g transform="translate(180,235)">
    <rect x="-72" y="-30" width="144" height="60" rx="8" fill="rgba(100,148,190,0.1)" stroke="rgba(100,148,190,0.5)" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#c9d1d9" font-size="17" font-weight="600">FIX</text>
    <text x="0" y="17" text-anchor="middle" fill="#8a94a6" font-size="11">update the system</text>
  </g>

  <!-- Curved arrows connecting clockwise -->
  <path d="M 522 115 Q 680 140 706 205" fill="none" stroke="rgba(100,148,190,0.55)" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 706 265 Q 680 340 522 355" fill="none" stroke="rgba(100,148,190,0.55)" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 378 355 Q 220 340 194 265" fill="none" stroke="rgba(100,148,190,0.55)" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 194 205 Q 220 140 378 115" fill="none" stroke="rgba(100,148,190,0.55)" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Day 5 inflection marker — spur off the FIND→FIX arc -->
  <g>
    <circle cx="268" cy="318" r="6" fill="#f0c866"/>
    <text x="130" y="310" fill="#f0c866" font-size="12" font-weight="700" letter-spacing="1">DAY 5</text>
    <text x="130" y="326" fill="#8a94a6" font-size="10">we weren't using our own scripts</text>
    <line x1="185" y1="313" x2="260" y2="317" stroke="#f0c866" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <!-- Center sigma -->
  <text x="450" y="255" text-anchor="middle" fill="rgba(240,200,102,0.18)" font-size="90" font-family="Manrope, system-ui" font-weight="800">σ</text>

  <text x="450" y="428" text-anchor="middle" fill="#6a7380" font-size="11" font-style="italic" font-family="Georgia, serif">
    The loop that found its own bugs.
  </text>
</svg>
