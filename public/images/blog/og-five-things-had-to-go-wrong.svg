<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Five things had to go wrong — defense in depth.">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1a1620"/>
      <stop offset="100%" stop-color="#080510"/>
    </radialGradient>
    <linearGradient id="fail-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a06a"/>
      <stop offset="100%" stop-color="#c84230"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-g)"/>

  <!-- LEFT: Five chained failure dominoes -->
  <g transform="translate(70, 130)">
    <!-- 5 falling dominoes — diagonal stack -->
    <g font-family="'SF Mono', monospace">
      <!-- Domino 1 -->
      <rect x="0" y="20" width="62" height="92" rx="4" fill="#1a2535" stroke="url(#fail-g)" stroke-width="2" transform="rotate(-8 31 66)"/>
      <text x="31" y="76" text-anchor="middle" font-size="36" fill="#f0a06a" font-weight="700" transform="rotate(-8 31 66)">1</text>

      <!-- Domino 2 -->
      <rect x="78" y="40" width="62" height="92" rx="4" fill="#1a2535" stroke="url(#fail-g)" stroke-width="2" transform="rotate(-4 109 86)"/>
      <text x="109" y="96" text-anchor="middle" font-size="36" fill="#f0a06a" font-weight="700" transform="rotate(-4 109 86)">2</text>

      <!-- Domino 3 -->
      <rect x="160" y="56" width="62" height="92" rx="4" fill="#1a2535" stroke="url(#fail-g)" stroke-width="2" transform="rotate(2 191 102)"/>
      <text x="191" y="112" text-anchor="middle" font-size="36" fill="#f0a06a" font-weight="700" transform="rotate(2 191 102)">3</text>

      <!-- Domino 4 -->
      <rect x="246" y="68" width="62" height="92" rx="4" fill="#1a2535" stroke="url(#fail-g)" stroke-width="2" transform="rotate(8 277 114)"/>
      <text x="277" y="124" text-anchor="middle" font-size="36" fill="#f0a06a" font-weight="700" transform="rotate(8 277 114)">4</text>

      <!-- Domino 5 — fully fallen -->
      <rect x="338" y="76" width="62" height="92" rx="4" fill="#c84230" stroke="#f0a06a" stroke-width="2.5" transform="rotate(14 369 122)"/>
      <text x="369" y="132" text-anchor="middle" font-size="36" fill="#fff" font-weight="700" transform="rotate(14 369 122)">5</text>
    </g>
  </g>

  <!-- Failure labels under dominoes -->
  <g font-family="'SF Mono', monospace" font-size="11px" fill="#6e7681">
    <text x="100" y="320">retina</text>
    <text x="180" y="320">no reload</text>
    <text x="265" y="320">accumulation</text>
    <text x="355" y="320">missing class</text>
    <text x="450" y="320" fill="#f0a06a" font-weight="600">DEAD SESSION</text>
  </g>

  <!-- Bottom-left chain summary -->
  <g transform="translate(60, 380)">
    <text font-family="Georgia, serif" font-size="32" font-style="italic" fill="#c9d1d9" opacity="0.85">
      <tspan x="0" y="0">10 megabytes of screenshots.</tspan>
      <tspan x="0" y="40">37 promises of memory.</tspan>
      <tspan x="0" y="80" fill="#f0a06a" font-weight="600">One 400 error.</tspan>
    </text>
  </g>

  <!-- RIGHT: Hero text -->
  <text x="700" y="170" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #f0a06a; letter-spacing: 8px; opacity: 0.8; font-weight: 600;">CASCADING FAILURE</text>

  <text x="700" y="270" style="font-family: Georgia, serif; font-size: 80px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">Five things</text>
  <text x="700" y="350" style="font-family: Georgia, serif; font-size: 80px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">had to go</text>
  <text x="700" y="430" style="font-family: Georgia, serif; font-size: 80px; fill: #f0a06a; font-weight: 700; letter-spacing: -2px;">wrong.</text>

  <text x="700" y="490" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.75;">Fix any one of them — the session survives.</text>

  <!-- Brand -->
  <line x1="60" y1="565" x2="520" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="60" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="1145" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
