<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="25,000 tokens before you say hello (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#15202e"/>
      <stop offset="100%" stop-color="#080c13"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>
  <pattern id="dotsM" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.4" fill="#6494be" opacity="0.08"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#dotsM)"/>

  <text x="300" y="110" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 6px; opacity: 0.8; font-weight: 600;">PROMPT ECONOMICS</text>

  <!-- Giant number -->
  <text x="300" y="360" text-anchor="middle" style="font-family: Georgia, serif; font-size: 170px; fill: #f0883e; font-weight: 700; letter-spacing: -5px;">25,000</text>
  <text x="300" y="420" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 5px; opacity: 0.8;">TOKENS</text>

  <!-- Hero tagline -->
  <text x="300" y="540" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1px;">before you</text>
  <text x="300" y="598" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #e4eaf4; font-style: italic; font-weight: 700; letter-spacing: -1px;">say hello.</text>

  <!-- Stats breakdown -->
  <g transform="translate(60, 680)" font-family="'SF Mono', monospace" font-size="14">
    <text x="240" y="0" text-anchor="middle" fill="#6494be" letter-spacing="3" opacity="0.75">THE BREAKDOWN</text>
    <g transform="translate(0, 40)">
      <text x="20" y="0" fill="#c9d1d9">system prompt</text>
      <text x="460" y="0" text-anchor="end" fill="#f0883e" font-weight="700">18,000</text>
    </g>
    <g transform="translate(0, 75)">
      <text x="20" y="0" fill="#c9d1d9">memory preload</text>
      <text x="460" y="0" text-anchor="end" fill="#f0883e" font-weight="700">5,000</text>
    </g>
    <g transform="translate(0, 110)">
      <text x="20" y="0" fill="#c9d1d9">tool registry</text>
      <text x="460" y="0" text-anchor="end" fill="#f0883e" font-weight="700">2,000</text>
    </g>
    <line x1="20" y1="130" x2="460" y2="130" stroke="#30363d" stroke-width="1" opacity="0.6"/>
    <g transform="translate(0, 160)">
      <text x="20" y="0" fill="#e4eaf4" font-weight="700">total</text>
      <text x="460" y="0" text-anchor="end" fill="#28c840" font-weight="700">25,000</text>
    </g>
  </g>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
