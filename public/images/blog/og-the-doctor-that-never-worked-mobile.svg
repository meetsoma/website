<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="The Doctor That Never Worked — JS string-comparison footgun (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" stroke="#6494be" stroke-width="0.3" opacity="0.06" fill="none"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#grid)"/>

  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #f0883e; letter-spacing: 6px; opacity: 0.9; font-weight: 600;">VERSION MIGRATION · RESOLVED</text>

  <!-- Hero text -->
  <text x="300" y="190" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">The Doctor</text>
  <text x="300" y="262" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">That Never</text>
  <text x="300" y="334" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -1.5px;">Worked.</text>

  <!-- Code card -->
  <g transform="translate(60, 430)">
    <rect x="0" y="0" width="480" height="280" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="18" r="5" fill="#27c93f"/>
    <text x="240" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e" letter-spacing="1">doctor.js</text>

    <g font-family="'SF Mono', monospace" font-size="15">
      <text x="26" y="68" fill="#6e7681" font-size="11">47</text>
      <text x="60" y="68" fill="#c9d1d9">if (projectV <tspan fill="#f85149" font-weight="700">&lt;</tspan> agentV) {</text>
      <text x="26" y="96" fill="#6e7681" font-size="11">48</text>
      <text x="60" y="96" fill="#c9d1d9">  upgrade();</text>
      <text x="26" y="124" fill="#6e7681" font-size="11">49</text>
      <text x="60" y="124" fill="#c9d1d9">}</text>
    </g>

    <line x1="20" y1="148" x2="460" y2="148" stroke="#30363d" stroke-width="1" opacity="0.6"/>

    <g font-family="'SF Mono', monospace" font-size="14">
      <text x="26" y="182" fill="#f0883e">&gt; "0.6.2" &lt; "0.10.0"</text>
      <text x="26" y="218" fill="#f85149" font-weight="700">false</text>
      <text x="110" y="218" fill="#c9d1d9" font-style="italic" font-size="13" opacity="0.85">← wrong.</text>
      <text x="26" y="254" fill="#c9d1d9" font-size="12" opacity="0.75">(lexicographic, not numeric)</text>
    </g>
  </g>

  <!-- Subtext -->
  <text x="300" y="790" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">31 characters of test setup.</text>
  <text x="300" y="825" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Months of silent failure.</text>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
