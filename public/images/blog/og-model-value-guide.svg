<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="$5 for a Chat, $0.40 for the Same Answer — model value guide">
  <defs>
    <radialGradient id="bg-glow" cx="55%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <radialGradient id="body-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec-g" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>
  <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
    <circle cx="17" cy="17" r="0.4" fill="#6494be" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══ PRICE BARS LEFT SIDE ═══ -->
  <g transform="translate(60, 100)">
    <!-- Header -->
    <text x="0" y="0" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; letter-spacing: 2px;">COST PER MILLION OUTPUT TOKENS</text>

    <!-- Opus 4.7 bar -->
    <text x="0" y="40" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">Claude Opus 4.7</text>
    <rect x="0" y="48" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="48" width="480" height="28" rx="4" fill="#6494be" opacity="0.7"/>
    <text x="490" y="68" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #c9d1d9; font-weight: 600;">$25.00</text>

    <!-- Sonnet 4.6 bar -->
    <text x="0" y="98" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">Claude Sonnet 4.6</text>
    <rect x="0" y="106" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="106" width="288" height="28" rx="4" fill="#6494be" opacity="0.55"/>
    <text x="490" y="126" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #c9d1d9; font-weight: 600;">$15.00</text>

    <!-- Gemini 3.5 Flash bar -->
    <text x="0" y="156" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">Gemini 3.5 Flash</text>
    <rect x="0" y="164" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="164" width="173" height="28" rx="4" fill="#f0883e" opacity="0.7"/>
    <text x="490" y="184" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #c9d1d9; font-weight: 600;">$9.00</text>

    <!-- Qwen3.7 Plus bar ⭐ -->
    <text x="0" y="214" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">Qwen3.7 Plus  ⭐</text>
    <rect x="0" y="222" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#6494be" stroke-width="1"/>
    <rect x="0" y="222" width="31" height="28" rx="4" fill="#6494be" opacity="0.9"/>
    <text x="490" y="242" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #8bb9e0; font-weight: 600;">$1.60</text>

    <!-- DeepSeek V4 Flash bar -->
    <text x="0" y="272" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">DeepSeek V4 Flash</text>
    <rect x="0" y="280" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="280" width="5" height="28" rx="4" fill="#f0883e" opacity="0.5"/>
    <text x="490" y="300" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #c9d1d9; font-weight: 600;">$0.28</text>

    <!-- Free models bar -->
    <text x="0" y="330" style="font-family: -apple-system, sans-serif; font-size: 14px; fill: #c9d1d9;">Free Models (Big P., MiMo, Nemotron, DeepSeek Free)</text>
    <rect x="0" y="338" width="480" height="28" rx="4" fill="rgba(100,148,190,0.12)" stroke="#30363d" stroke-width="1"/>
    <rect x="0" y="338" width="0" height="28" rx="4" fill="none"/>
    <text x="490" y="358" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6e7681; font-weight: 600;">$0.00</text>
  </g>

  <!-- ═══ HERO TEXT RIGHT ═══ -->
  <g transform="translate(620, 100)">
    <text x="0" y="0" style="font-family: Georgia, serif; font-size: 52px; fill: #c9d1d9; font-weight: 600;">
      <tspan x="0" dy="0">$5 for a Chat,</tspan>
      <tspan x="0" dy="62" fill="#6494be">$0.40 for the</tspan>
      <tspan x="0" dy="62">Same Answer</tspan>
    </text>
    <text x="0" y="240" style="font-family: -apple-system, sans-serif; font-size: 18px; fill: #6e7681;">
      <tspan x="0" dy="0">Most models cost 90% less than the one</tspan>
      <tspan x="0" dy="28">you default to. And they work the same.</tspan>
    </text>
  </g>

  <!-- ═══ MASCOT — right bottom ═══ -->
  <g transform="translate(890, 340) scale(1.2)">
    <circle cx="190" cy="175" r="130" fill="url(#body-g)"/>
    <circle cx="190" cy="175" r="130" fill="url(#spec-g)"/>
    <rect x="102" y="140" width="78" height="48" rx="10" fill="#0e1a26" stroke="#080f18" stroke-width="3"/>
    <rect x="192" y="138" width="78" height="48" rx="10" fill="#0e1a26" stroke="#080f18" stroke-width="3"/>
    <path d="M180,162 Q187,150 192,162" fill="none" stroke="#080f18" stroke-width="4"/>
    <line x1="102" y1="159" x2="62" y2="149" stroke="#080f18" stroke-width="4" stroke-linecap="round"/>
    <line x1="270" y1="157" x2="305" y2="147" stroke="#080f18" stroke-width="4" stroke-linecap="round"/>
    <path d="M158,222 Q190,250 232,215" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.55"/>
    <text x="108" y="285" style="font-family: 'SF Mono', monospace; font-size: 10px; fill: #8bb9e0; opacity: 0.4;">σ</text>
  </g>

  <!-- Footer bar -->
  <line x1="55" y1="565" x2="520" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="55" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="520" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>