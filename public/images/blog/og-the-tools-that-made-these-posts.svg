<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="bg" cx="55%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#6494be" opacity="0.08"/>
    </pattern>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0c866"/>
      <stop offset="1" stop-color="#d18f2a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Kicker -->
  <text x="80" y="105" fill="#6494be" font-family="'SF Mono', monospace" font-size="15"
        letter-spacing="6" opacity="0.85">WRITING  ABOUT  AN  EVOLVING  SYSTEM</text>

  <!-- Hero headline — Georgia serif -->
  <text x="80" y="210" fill="#e4eaf4" font-size="89" font-weight="700" letter-spacing="-2">The tools that made</text>
  <text x="80" y="305" fill="#e4eaf4" font-size="89" font-weight="700" letter-spacing="-2">these <tspan fill="url(#gold)" font-style="italic">posts.</tspan></text>

  <!-- Subtitle -->
  <text x="80" y="380" fill="#9dafc4" font-size="24" font-style="italic">Four commands. One corpus. No more drift.</text>

  <!-- Four tool chips, terminal-style -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="18">
    <rect x="80" y="425" width="240" height="46" rx="6" fill="rgba(100,148,190,0.12)" stroke="rgba(100,148,190,0.4)" stroke-width="1"/>
    <text x="98" y="454" fill="#8bb9e0">soma trace</text>

    <rect x="340" y="425" width="280" height="46" rx="6" fill="rgba(100,148,190,0.12)" stroke="rgba(100,148,190,0.4)" stroke-width="1"/>
    <text x="358" y="454" fill="#8bb9e0">soma concepts</text>

    <rect x="640" y="425" width="280" height="46" rx="6" fill="rgba(100,148,190,0.12)" stroke="rgba(100,148,190,0.4)" stroke-width="1"/>
    <text x="658" y="454" fill="#8bb9e0">soma blog-graph</text>

    <rect x="80" y="487" width="280" height="46" rx="6" fill="rgba(240,200,102,0.15)" stroke="rgba(240,200,102,0.5)" stroke-width="1"/>
    <text x="98" y="516" fill="#f0c866">soma blog-audit</text>
  </g>

  <!-- Brand bar -->
  <line x1="80" y1="580" x2="1120" y2="580" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="608" fill="#6494be" font-family="'SF Mono', monospace" font-size="13" letter-spacing="3" opacity="0.85">SOMA</text>
  <text x="1120" y="608" fill="#6e7681" font-family="'SF Mono', monospace" font-size="13" text-anchor="end" opacity="0.7">soma.gravicity.ai</text>
</svg>
