<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="The scripts we deleted (mobile).">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101621"/>
      <stop offset="100%" stop-color="#060910"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bg)"/>

  <text x="300" y="80" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 7px; opacity: 0.75; font-weight: 600;">PRE-PUBLISH CLEANUP</text>

  <!-- Git-status card -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="500" height="410" rx="10" fill="#0d131f" stroke="#1a2535" stroke-width="1.5"/>
    <text x="20" y="38" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6494be; letter-spacing: 2px; opacity: 0.75;">GIT STATUS</text>
    <line x1="20" y1="52" x2="480" y2="52" stroke="#1a2535" stroke-width="1"/>
    <g font-family="'SF Mono', monospace" font-size="18">
      <text x="20" y="98" fill="#c84242" opacity="0.8">-</text>
      <text x="48" y="98" fill="#8b8b8b" text-decoration="line-through" style="text-decoration-color:#f0883e;">soma-find.sh</text>
      <text x="20" y="138" fill="#c84242" opacity="0.8">-</text>
      <text x="48" y="138" fill="#8b8b8b" text-decoration="line-through" style="text-decoration-color:#f0883e;">soma-search.sh</text>
      <text x="20" y="178" fill="#c84242" opacity="0.8">-</text>
      <text x="48" y="178" fill="#8b8b8b" text-decoration="line-through" style="text-decoration-color:#f0883e;">soma-refs.sh</text>
      <text x="20" y="218" fill="#c84242" opacity="0.8">-</text>
      <text x="48" y="218" fill="#8b8b8b" text-decoration="line-through" style="text-decoration-color:#f0883e;">soma-map.sh</text>
      <text x="20" y="258" fill="#c84242" opacity="0.8">-</text>
      <text x="48" y="258" fill="#8b8b8b" text-decoration="line-through" style="text-decoration-color:#f0883e;">soma-trace.sh</text>
      <text x="20" y="310" fill="#6494be" opacity="0.55" font-size="15">...about to ship</text>
      <text x="20" y="340" fill="#6494be" opacity="0.55" font-size="15">without them.</text>
      <text x="20" y="378" fill="#28c840" opacity="0.8">✓</text>
      <text x="48" y="378" fill="#e4eaf4" font-weight="600">git checkout -- .</text>
    </g>
  </g>

  <!-- Hero -->
  <text x="300" y="640" text-anchor="middle" style="font-family: Georgia, serif; font-size: 44px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1px;">The scripts</text>
  <text x="300" y="690" text-anchor="middle" style="font-family: Georgia, serif; font-size: 44px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -1px;">we almost deleted.</text>

  <!-- sub -->
  <text x="300" y="790" text-anchor="middle" style="font-family: Georgia, serif; font-size: 19px; fill: #c9d1d9; opacity: 0.8; font-style: italic;">We built a memory system</text>
  <text x="300" y="816" text-anchor="middle" style="font-family: Georgia, serif; font-size: 19px; fill: #c9d1d9; opacity: 0.8; font-style: italic;">for AI agents. Then forgot</text>
  <text x="300" y="842" text-anchor="middle" style="font-family: Georgia, serif; font-size: 19px; fill: #c9d1d9; opacity: 0.8; font-style: italic;">our own tools existed.</text>

  <line x1="100" y1="935" x2="500" y2="935" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <text x="100" y="975" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="975" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
