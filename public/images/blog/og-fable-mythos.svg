<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The $0.00 that meant I wasn't running Fable — Soma, v0.31.0">
  <defs>
    <radialGradient id="og-bg" cx="42%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#15110a"/>
      <stop offset="55%" stop-color="#10131a"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <radialGradient id="og-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b840" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#d97706" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-body" cx="38%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#ffd271"/>
      <stop offset="45%" stop-color="#f0a830"/>
      <stop offset="100%" stop-color="#b5660c"/>
    </radialGradient>
    <linearGradient id="og-num" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd271"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- dotted texture, very faint -->
  <g fill="#f0b840" opacity="0.05">
    <circle cx="120" cy="500" r="2"/><circle cx="300" cy="120" r="2"/><circle cx="620" cy="80" r="2"/><circle cx="540" cy="540" r="2"/>
  </g>

  <!-- ── LEFT: the number-dominant hero ── -->
  <rect x="80" y="120" width="170" height="4" rx="2" fill="#f0883e"/>

  <text x="76" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="190" font-weight="700" letter-spacing="-4" fill="url(#og-num)">$0.00</text>

  <text x="84" y="392" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="33" fill="#c9d1d9">the cost that meant</text>
  <text x="84" y="436" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="33" fill="#c9d1d9">I wasn't running <tspan fill="#f0b840" font-weight="700">Fable</tspan></text>

  <!-- version pill -->
  <rect x="84" y="470" width="118" height="34" rx="17" fill="rgba(240,184,64,0.10)" stroke="#f0b840" stroke-width="1"/>
  <text x="143" y="492" text-anchor="middle" font-family="'SF Mono', monospace" font-size="15" fill="#f0b840" letter-spacing="1">v0.31.0</text>

  <!-- ── RIGHT: the amber Fable σ-mascot, premium tier ── -->
  <g transform="translate(902,286)">
    <circle cx="0" cy="0" r="248" fill="url(#og-aura)"/>

    <!-- crescent moon companion, tiny shades -->
    <g transform="translate(150,-176)">
      <circle cx="0" cy="0" r="46" fill="#f0d28a" opacity="0.18"/>
      <path d="M16,-38 a44,44 0 1 0 0,76 a33,33 0 1 1 0,-76 z" fill="#f0d28a" opacity="0.9"/>
      <rect x="-20" y="-8" width="16" height="9" rx="3" fill="#1a1206" opacity="0.7"/>
    </g>

    <!-- mythos sparkles -->
    <g fill="#ffd271" opacity="0.85">
      <path d="M-188,-150 l4,12 l12,4 l-12,4 l-4,12 l-4,-12 l-12,-4 l12,-4 z"/>
      <path d="M196,120 l3,9 l9,3 l-9,3 l-3,9 l-3,-9 l-9,-3 l9,-3 z" opacity="0.7"/>
    </g>

    <!-- legs -->
    <rect x="-40" y="118" width="28" height="44" rx="14" fill="url(#og-body)"/>
    <rect x="14" y="118" width="28" height="44" rx="14" fill="url(#og-body)"/>
    <!-- arms -->
    <circle cx="-150" cy="6" r="38" fill="url(#og-body)"/>
    <circle cx="150" cy="6" r="38" fill="url(#og-body)"/>
    <!-- body -->
    <circle cx="0" cy="0" r="156" fill="url(#og-body)"/>
    <!-- top highlight -->
    <ellipse cx="-48" cy="-78" rx="76" ry="42" fill="#fff1c2" opacity="0.34"/>

    <!-- brand sunglasses + smirk -->
    <rect x="-104" y="-34" width="86" height="56" rx="12" fill="#1a1206" stroke="#0d0a04" stroke-width="3"/>
    <rect x="18" y="-34" width="86" height="56" rx="12" fill="#1a1206" stroke="#0d0a04" stroke-width="3"/>
    <line x1="-18" y1="-22" x2="18" y2="-22" stroke="#1a1206" stroke-width="7" stroke-linecap="round"/>
    <!-- a glint in the right lens (vision) -->
    <circle cx="74" cy="-12" r="9" fill="#bfe3ff" opacity="0.65"/>
    <circle cx="78" cy="-16" r="3" fill="#ffffff" opacity="0.9"/>
    <!-- smirk: asymmetric, one side higher -->
    <path d="M-44,64 Q0,96 60,58" fill="none" stroke="#1a1206" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- ── brand bar ── -->
  <line x1="0" y1="566" x2="1200" y2="566" stroke="#30363d" stroke-width="1"/>
  <text x="80" y="602" font-family="'SF Mono', monospace" font-size="17" fill="#c9d1d9" letter-spacing="3">SOMA</text>
  <text x="1120" y="602" text-anchor="end" font-family="-apple-system, sans-serif" font-size="15" fill="#6e7681">soma.gravicity.ai</text>
</svg>
