<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="The Tests That Bailed Silently — five suites, zero assertions (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <linearGradient id="row-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(40,200,64,0.12)"/>
      <stop offset="100%" stop-color="rgba(40,200,64,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" stroke="#6494be" stroke-width="0.3" opacity="0.06" fill="none"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#grid)"/>

  <!-- Top label -->
  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #f0883e; letter-spacing: 5px; opacity: 0.85; font-weight: 600;">CI STATUS · GREEN</text>

  <!-- Hero text -->
  <text x="300" y="180" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">The Tests</text>
  <text x="300" y="252" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">That Bailed</text>
  <text x="300" y="324" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -1.5px;">Silently.</text>

  <!-- Mini terminal -->
  <g transform="translate(60, 400)">
    <rect x="0" y="0" width="480" height="340" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <circle cx="18" cy="18" r="5" fill="#ff5f56"/>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="18" r="5" fill="#27c93f"/>
    <text x="240" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e" letter-spacing="1">CI · test-suite</text>

    <text x="20" y="60" font-family="'SF Mono', monospace" font-size="13" fill="#28c840" font-weight="600">✓ ALL SUITES PASSING</text>
    <text x="460" y="60" text-anchor="end" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681" opacity="0.8">5 of 5</text>

    <g font-family="'SF Mono', monospace" font-size="12">
      <g transform="translate(20, 100)">
        <rect x="-10" y="-14" width="470" height="30" fill="url(#row-fade)"/>
        <text x="0" y="0" fill="#28c840">✓</text>
        <text x="20" y="0" fill="#c9d1d9">test-maps.sh</text>
        <text x="280" y="0" fill="#6e7681">0 assert</text>
        <text x="400" y="0" fill="#f85149" font-size="10" letter-spacing="1.5">BAILED</text>
      </g>
      <g transform="translate(20, 140)">
        <rect x="-10" y="-14" width="470" height="30" fill="url(#row-fade)"/>
        <text x="0" y="0" fill="#28c840">✓</text>
        <text x="20" y="0" fill="#c9d1d9">test-skill-loader.sh</text>
        <text x="280" y="0" fill="#6e7681">0 assert</text>
        <text x="400" y="0" fill="#f85149" font-size="10" letter-spacing="1.5">BAILED</text>
      </g>
      <g transform="translate(20, 180)">
        <rect x="-10" y="-14" width="470" height="30" fill="url(#row-fade)"/>
        <text x="0" y="0" fill="#28c840">✓</text>
        <text x="20" y="0" fill="#c9d1d9">test-doctor.sh</text>
        <text x="280" y="0" fill="#6e7681">3 skipped</text>
        <text x="400" y="0" fill="#f85149" font-size="10" letter-spacing="1.5">BAILED</text>
      </g>
      <g transform="translate(20, 220)">
        <rect x="-10" y="-14" width="470" height="30" fill="url(#row-fade)"/>
        <text x="0" y="0" fill="#28c840">✓</text>
        <text x="20" y="0" fill="#c9d1d9">test-somaverse.sh</text>
        <text x="280" y="0" fill="#6e7681">4 skipped</text>
        <text x="400" y="0" fill="#f85149" font-size="10" letter-spacing="1.5">BAILED</text>
      </g>
      <g transform="translate(20, 260)">
        <rect x="-10" y="-14" width="470" height="30" fill="url(#row-fade)"/>
        <text x="0" y="0" fill="#28c840">✓</text>
        <text x="20" y="0" fill="#c9d1d9">test-install-flows.sh</text>
        <text x="280" y="0" fill="#6e7681">0 assert</text>
        <text x="400" y="0" fill="#f85149" font-size="10" letter-spacing="1.5">BAILED</text>
      </g>
    </g>
    <text x="240" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#c9d1d9" font-style="italic" opacity="0.85">CI green. Zero assertions ran.</text>
  </g>

  <!-- Stat -->
  <text x="300" y="800" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#e4eaf4" font-weight="700">800 → <tspan fill="#28c840">1041</tspan></text>
  <text x="300" y="830" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#c9d1d9" opacity="0.75" letter-spacing="2">AFTER FIXING FIVE PATHS</text>
  <text x="300" y="870" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#f0883e" font-style="italic" opacity="0.9">+ 4 user-impacting bugs surfaced.</text>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
