<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'SF Mono', Menlo, monospace">
  <text x="450" y="34" text-anchor="middle" fill="#6a7380" font-size="12" letter-spacing="6">THE  LAST  EIGHT  PERCENT</text>

  <!-- Big horizontal context bar. Filled 92%, red danger zone above 95%. -->
  <g transform="translate(80,120)">
    <!-- Track -->
    <rect x="0" y="0" width="740" height="74" rx="8" fill="rgba(100,148,190,0.08)" stroke="rgba(100,148,190,0.3)" stroke-width="1"/>
    <!-- Fill — 92% -->
    <rect x="0" y="0" width="680.8" height="74" rx="8" fill="url(#fill-grad)"/>
    <defs>
      <linearGradient id="fill-grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="rgba(100,148,190,0.55)"/>
        <stop offset="0.75" stop-color="rgba(100,148,190,0.55)"/>
        <stop offset="0.9" stop-color="rgba(240,200,102,0.6)"/>
        <stop offset="1" stop-color="rgba(240,136,62,0.7)"/>
      </linearGradient>
    </defs>

    <!-- 95% danger threshold -->
    <line x1="703" y1="-10" x2="703" y2="84" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="703" y="-16" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="700">95%</text>

    <!-- 92% here-pointer -->
    <line x1="680.8" y1="84" x2="680.8" y2="100" stroke="#f0c866" stroke-width="1.5"/>
    <text x="680.8" y="116" text-anchor="middle" fill="#f0c866" font-size="13" font-weight="700">92% — HERE</text>

    <!-- 0 / 100 anchors -->
    <text x="0" y="-8" fill="#6a7380" font-size="11">0</text>
    <text x="740" y="-8" text-anchor="end" fill="#6a7380" font-size="11">100%</text>

    <!-- In-bar label -->
    <text x="340" y="44" text-anchor="middle" fill="#e4eaf4" font-size="22" font-weight="700" font-family="Manrope, system-ui">context used</text>
  </g>

  <!-- Consequences column, right of the 92% marker -->
  <g transform="translate(80,250)" font-size="12">
    <text x="0" y="0" fill="#8a94a6" letter-spacing="2">WHAT  BREAKS  IN  THE  LAST  8%</text>
    <g transform="translate(0,26)">
      <circle cx="0" cy="-4" r="3" fill="#f0883e"/>
      <text x="12" y="0" fill="#c9d1d9">steering collapses — agent stops absorbing follow-ups</text>
    </g>
    <g transform="translate(0,48)">
      <circle cx="0" cy="-4" r="3" fill="#f0883e"/>
      <text x="12" y="0" fill="#c9d1d9">deep thinking flattens — responses become terse, pattern-matched</text>
    </g>
    <g transform="translate(0,70)">
      <circle cx="0" cy="-4" r="3" fill="#f0883e"/>
      <text x="12" y="0" fill="#c9d1d9">the next edit feels further away than the last one did</text>
    </g>
    <g transform="translate(0,92)">
      <circle cx="0" cy="-4" r="3" fill="#f0883e"/>
      <text x="12" y="0" fill="#c9d1d9">exhale window closes — no time for a good preload</text>
    </g>
  </g>

  <text x="450" y="400" text-anchor="middle" fill="#6a7380" font-size="11" font-style="italic" font-family="Georgia, serif">
    Context doesn't fail at 100%. It fails at 92%, quietly, mid-thought.
  </text>
</svg>
