<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Your cache expired. Mine didn't. (mobile)">
  <defs>
    <radialGradient id="bg" cx="55%" cy="45%" r="90%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
    <radialGradient id="body-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec-g" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bg)"/>

  <!-- Cool Soma mascot (face only) centered top -->
  <g transform="translate(195, 135)">
    <circle cx="105" cy="140" r="140" fill="url(#body-g)"/>
    <circle cx="105" cy="140" r="140" fill="url(#spec-g)"/>
    <!-- Shades -->
    <rect x="40" y="125" width="66" height="42" rx="9" fill="#0e1a26" stroke="#080f18" stroke-width="3"/>
    <rect x="116" y="124" width="66" height="42" rx="9" fill="#0e1a26" stroke="#080f18" stroke-width="3"/>
    <path d="M106,145 Q112,134 116,145" fill="none" stroke="#080f18" stroke-width="4"/>
    <line x1="40" y1="142" x2="8" y2="134" stroke="#080f18" stroke-width="4" stroke-linecap="round"/>
    <line x1="182" y1="140" x2="210" y2="132" stroke="#080f18" stroke-width="4" stroke-linecap="round"/>
    <rect x="46" y="131" width="20" height="9" rx="4" fill="white" opacity="0.06"/>
    <rect x="122" y="129" width="20" height="9" rx="4" fill="white" opacity="0.06"/>
    <!-- Smirk -->
    <path d="M77,200 Q105,225 138,195" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Cracked "CLAW CODE" label -->
  <g opacity="0.3">
    <text x="300" y="465" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 18px; fill: #6e7681; letter-spacing: 6px; font-weight: 600;">CLAW CODE</text>
    <line x1="215" y1="460" x2="385" y2="460" stroke="#6e7681" stroke-width="2"/>
    <path d="M260,450 L265,464 L258,474" fill="none" stroke="#f0883e" stroke-width="1.5" opacity="0.6"/>
    <path d="M320,448 L324,462 L318,474 L323,480" fill="none" stroke="#f0883e" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Hero text -->
  <text x="300" y="560" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">Your cache</text>
  <text x="300" y="620" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #f0883e; font-weight: 700; letter-spacing: -1.5px;">expired.</text>
  <text x="300" y="720" text-anchor="middle" style="font-family: Georgia, serif; font-size: 48px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">Mine didn't.</text>

  <!-- Keepalive heart -->
  <text x="300" y="795" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 20px; fill: #f0883e; opacity: 0.85;">&#9829; 5/5</text>

  <!-- Sub -->
  <text x="300" y="860" text-anchor="middle" style="font-family: Georgia, serif; font-size: 17px; fill: #c9d1d9; opacity: 0.7; font-style: italic;">Why your Claude bill spiked.</text>
  <text x="300" y="884" text-anchor="middle" style="font-family: Georgia, serif; font-size: 17px; fill: #c9d1d9; opacity: 0.7; font-style: italic;">And how Soma keeps hers warm.</text>

  <line x1="100" y1="935" x2="500" y2="935" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <text x="100" y="975" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="975" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
