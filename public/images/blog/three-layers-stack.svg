<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Three layers to confidence — CLI, Agent, Workspace version drift visualized as stacked panes">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#11151c"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
    <symbol id="wire3" viewBox="0 0 12 12">
      <circle cx="6" cy="6" r="3" fill="rgba(124,178,212,0.35)"/>
    </symbol>
    <filter id="glowStale" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bgGrad)"/>

  <!-- Three layered panes, staggered horizontally to feel like a stack -->
  <!-- Layer 1: CLI (top, stale) -->
  <g transform="translate(80,60)">
    <rect x="0.5" y="0.5" width="1039" height="100" rx="12" fill="rgba(20,25,34,0.72)" stroke="rgba(230,174,90,0.42)" stroke-width="1.3"/>
    <rect x="0.5" y="0.5" width="1039" height="28" rx="12" fill="rgba(12,15,22,0.55)"/>
    <rect x="0.5" y="14" width="1039" height="14.5" fill="rgba(12,15,22,0.55)"/>
    <line x1="0" y1="28" x2="1040" y2="28" stroke="rgba(230,174,90,0.18)"/>
    <!-- grip -->
    <g transform="translate(14,11)" fill="rgba(124,178,212,0.3)">
      <rect width="3" height="3" rx="0.5"/><rect x="5" width="3" height="3" rx="0.5"/><rect x="10" width="3" height="3" rx="0.5"/>
      <rect y="5" width="3" height="3" rx="0.5"/><rect x="5" y="5" width="3" height="3" rx="0.5"/><rect x="10" y="5" width="3" height="3" rx="0.5"/>
    </g>
    <text x="36" y="19" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="11" font-weight="600" letter-spacing="0.4">LAYER 1 · CLI (meetsoma)</text>
    <!-- Content row -->
    <text x="30" y="65" fill="#e4eaf4" font-family="'Satoshi',system-ui" font-size="16" font-weight="700">v0.3.3</text>
    <text x="30" y="88" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="12">the thin npm bootstrap</text>
    <!-- status -->
    <g transform="translate(700,58)">
      <text fill="#e6ae5a" font-family="'Satoshi',system-ui" font-size="12" font-weight="700">⬆ stale</text>
      <text y="22" fill="#9dafc4" font-family="ui-monospace,monospace" font-size="11">npm: v0.3.4</text>
    </g>
    <!-- hint -->
    <g transform="translate(870,58)">
      <text fill="#f0c866" font-family="'Satoshi',system-ui" font-size="10" font-weight="600">→ Fix:</text>
      <text y="22" fill="#e4eaf4" font-family="ui-monospace,monospace" font-size="11.5">npm i -g meetsoma</text>
    </g>
  </g>

  <!-- Layer 2: Agent (center, dev-ahead) -->
  <g transform="translate(80,190)">
    <rect x="0.5" y="0.5" width="1039" height="100" rx="12" fill="rgba(20,25,34,0.72)" stroke="rgba(124,178,212,0.4)" stroke-width="1.3"/>
    <rect x="0.5" y="0.5" width="1039" height="28" rx="12" fill="rgba(12,15,22,0.55)"/>
    <rect x="0.5" y="14" width="1039" height="14.5" fill="rgba(12,15,22,0.55)"/>
    <line x1="0" y1="28" x2="1040" y2="28" stroke="rgba(124,178,212,0.18)"/>
    <g transform="translate(14,11)" fill="rgba(124,178,212,0.3)">
      <rect width="3" height="3" rx="0.5"/><rect x="5" width="3" height="3" rx="0.5"/><rect x="10" width="3" height="3" rx="0.5"/>
      <rect y="5" width="3" height="3" rx="0.5"/><rect x="5" y="5" width="3" height="3" rx="0.5"/><rect x="10" y="5" width="3" height="3" rx="0.5"/>
    </g>
    <text x="36" y="19" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="11" font-weight="600" letter-spacing="0.4">LAYER 2 · AGENT (soma-agent)</text>
    <text x="30" y="65" fill="#e4eaf4" font-family="'Satoshi',system-ui" font-size="16" font-weight="700">v0.20.1.1</text>
    <text x="30" y="88" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="12">the runtime · extensions · body · protocols</text>
    <g transform="translate(700,58)">
      <text fill="#89d189" font-family="'Satoshi',system-ui" font-size="12" font-weight="700">✓ dev-ahead</text>
      <text y="22" fill="#9dafc4" font-family="ui-monospace,monospace" font-size="11">npm: unpublished</text>
    </g>
    <g transform="translate(870,58)">
      <text fill="#89d189" font-family="'Satoshi',system-ui" font-size="11" font-weight="600">✓ No action</text>
    </g>
  </g>

  <!-- Layer 3: Workspace (bottom, marker-lag) -->
  <g transform="translate(80,320)">
    <rect x="0.5" y="0.5" width="1039" height="100" rx="12" fill="rgba(20,25,34,0.72)" stroke="rgba(230,174,90,0.42)" stroke-width="1.3"/>
    <rect x="0.5" y="0.5" width="1039" height="28" rx="12" fill="rgba(12,15,22,0.55)"/>
    <rect x="0.5" y="14" width="1039" height="14.5" fill="rgba(12,15,22,0.55)"/>
    <line x1="0" y1="28" x2="1040" y2="28" stroke="rgba(230,174,90,0.18)"/>
    <g transform="translate(14,11)" fill="rgba(124,178,212,0.3)">
      <rect width="3" height="3" rx="0.5"/><rect x="5" width="3" height="3" rx="0.5"/><rect x="10" width="3" height="3" rx="0.5"/>
      <rect y="5" width="3" height="3" rx="0.5"/><rect x="5" y="5" width="3" height="3" rx="0.5"/><rect x="10" y="5" width="3" height="3" rx="0.5"/>
    </g>
    <text x="36" y="19" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="11" font-weight="600" letter-spacing="0.4">LAYER 3 · WORKSPACE (.soma)</text>
    <text x="30" y="65" fill="#e4eaf4" font-family="'Satoshi',system-ui" font-size="16" font-weight="700">v0.11.4</text>
    <text x="30" y="88" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="12">per-project migration marker in settings.json</text>
    <g transform="translate(700,58)">
      <text fill="#e6ae5a" font-family="'Satoshi',system-ui" font-size="12" font-weight="700">⬆ marker lag</text>
      <text y="22" fill="#9dafc4" font-family="ui-monospace,monospace" font-size="11">9 silent releases behind</text>
    </g>
    <g transform="translate(870,58)">
      <text fill="#f0c866" font-family="'Satoshi',system-ui" font-size="10" font-weight="600">→ Fix:</text>
      <text y="22" fill="#e4eaf4" font-family="ui-monospace,monospace" font-size="11.5">soma doctor</text>
    </g>
  </g>

  <!-- Connector wires between layers (left side, suggesting stack) -->
  <g stroke="rgba(124,178,212,0.22)" stroke-width="1" fill="none" stroke-dasharray="2 3">
    <path d="M 40 110 L 40 240"/>
    <path d="M 40 240 L 40 370"/>
  </g>
  <use href="#wire3" x="34" y="104" width="12" height="12"/>
  <use href="#wire3" x="34" y="234" width="12" height="12"/>
  <use href="#wire3" x="34" y="364" width="12" height="12"/>

  <!-- Title -->
  <g transform="translate(600,460)">
    <text text-anchor="middle" fill="#9dafc4" font-family="'Satoshi',system-ui" font-size="13" letter-spacing="0.3" opacity="0.85">soma check-updates · three layers visible · every drift has a recovery hint</text>
  </g>
</svg>
