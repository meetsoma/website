<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'SF Mono', Menlo, monospace">
  <text x="450" y="34" text-anchor="middle" fill="#6a7380" font-size="12" letter-spacing="6">THE  BODY  DIRECTORY</text>

  <!-- Monospace tree listing, left-aligned with annotations on right -->
  <g font-size="15" transform="translate(120,78)">
    <text x="0" y="0" fill="#c9d1d9">.soma/body/</text>

    <g transform="translate(18,28)">
