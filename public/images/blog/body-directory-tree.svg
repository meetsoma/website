  <!-- Legend -->
  <g transform="translate(120,378)" font-size="11">
    <circle cx="0" cy="-4" r="5" fill="#6494be"/>
    <text x="12" y="0" fill="#8a94a6">content</text>
    <circle cx="90" cy="-4" r="5" fill="#f0c866"/>
    <text x="102" y="0" fill="#8a94a6">compiled template</text>
    <circle cx="240" cy="-4" r="5" fill="#6a7380"/>
    <text x="252" y="0" fill="#8a94a6">meta (describes itself)</text>
  </g>

  <text x="450" y="428" text-anchor="middle" fill="#6a7380" font-size="11" font-style="italic" font-family="Georgia, serif">
    The machinery is a folder. The folder is the machinery.
  </text>
