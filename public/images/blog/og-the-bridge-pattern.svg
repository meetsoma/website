<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="The Bridge Pattern — a WebSocket relay that became the platform.">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#131b28"/>
      <stop offset="100%" stop-color="#080c13"/>
    </radialGradient>
    <radialGradient id="node-a" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="node-b" cx="40%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#f0b880"/>
      <stop offset="100%" stop-color="#c26a2a"/>
    </radialGradient>
    <linearGradient id="bridge-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#9cb2c6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-g)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#6494be" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ═══ Supra label ═══ -->
  <text x="600" y="75" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; letter-spacing: 8px; opacity: 0.65; font-weight: 600;">ARCHITECTURE</text>

  <!-- ═══ THE DIAGRAM — the image IS the story ═══ -->
  <!-- Left node: agent -->
  <g>
    <circle cx="200" cy="315" r="85" fill="url(#node-a)" opacity="0.95"/>
    <text x="200" y="310" text-anchor="middle" style="font-family: Georgia, serif; font-size: 24px; fill: #e4eaf4; font-weight: 700;">agent</text>
    <text x="200" y="338" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #c9d1d9; opacity: 0.75; letter-spacing: 1px;">local</text>
  </g>

  <!-- Right node: world (browser/terminal/fs) -->
  <g>
    <circle cx="1000" cy="315" r="85" fill="url(#node-b)" opacity="0.95"/>
    <text x="1000" y="310" text-anchor="middle" style="font-family: Georgia, serif; font-size: 24px; fill: #1a1008; font-weight: 700;">world</text>
    <text x="1000" y="338" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #1a1008; opacity: 0.8; letter-spacing: 1px;">browser · fs · tty</text>
  </g>

  <!-- THE BRIDGE — stylized cable-bridge / suspension -->
  <!-- Bridge deck -->
  <line x1="285" y1="315" x2="915" y2="315" stroke="url(#bridge-g)" stroke-width="5" stroke-linecap="round"/>
  <!-- Suspension curve above -->
  <path d="M 285 315 Q 600 210 915 315" fill="none" stroke="#6494be" stroke-width="2" opacity="0.5" stroke-dasharray="4,6"/>
  <!-- Suspension cables (verticals) -->
  <line x1="380" y1="253" x2="380" y2="315" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <line x1="480" y1="225" x2="480" y2="315" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="212" x2="600" y2="315" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <line x1="720" y1="225" x2="720" y2="315" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <line x1="820" y1="253" x2="820" y2="315" stroke="#6494be" stroke-width="1" opacity="0.4"/>

  <!-- Bridge label -->
  <text x="600" y="180" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #9cb2c6; letter-spacing: 4px; opacity: 0.85;">WEBSOCKET RELAY</text>

  <!-- Flow arrows — both directions -->
  <polygon points="540,308 555,315 540,322" fill="#9cb2c6" opacity="0.7"/>
  <polygon points="660,308 645,315 660,322" fill="#9cb2c6" opacity="0.7"/>

  <!-- ═══ TITLE — below diagram ═══ -->
  <text x="600" y="455" text-anchor="middle" style="font-family: Georgia, 'Times New Roman', serif; font-size: 72px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">The Bridge Pattern</text>

  <!-- Caption — the one-liner -->
  <text x="600" y="505" text-anchor="middle" style="font-family: Georgia, serif; font-size: 24px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">The relay became the platform.</text>

  <!-- ═══ BRAND BAR ═══ -->
  <line x1="55" y1="565" x2="520" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="55" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="1145" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
