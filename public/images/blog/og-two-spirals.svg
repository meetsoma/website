<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Two Spirals — process and concept.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#15202e"/>
      <stop offset="100%" stop-color="#080c13"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00e5ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot-orange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0883e" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dot-yellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f1fa8c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f1fa8c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Category label -->
  <text x="600" y="70" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 8px; opacity: 0.85; font-weight: 600;">REFLECTION · ARCHITECTURE</text>

  <!-- Hero title -->
  <text x="600" y="140" text-anchor="middle" style="font-family: Georgia, serif; font-size: 74px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">Two <tspan fill="#f0883e" font-style="italic">Spirals.</tspan></text>

  <!-- Subtitle -->
  <text x="600" y="178" text-anchor="middle" style="font-family: Georgia, serif; font-size: 20px; fill: #c9d1d9; opacity: 0.8; font-style: italic;">How we work. What we're made of.</text>

  <!-- ─── Left spiral (PROCESS) ─── -->
  <g transform="translate(300, 400)">
    <!-- concentric ring guides -->
    <circle r="110" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.15"/>
    <circle r="80" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.2"/>
    <circle r="50" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.25"/>
    <!-- 7 phase nodes -->
    <g>
      <circle cx="0" cy="-110" r="8" fill="url(#dot-blue)"/>
      <circle cx="0" cy="-110" r="4" fill="#6494be"/>
      <circle cx="78" cy="-78" r="8" fill="url(#dot-blue)"/>
      <circle cx="78" cy="-78" r="4" fill="#6494be"/>
      <!-- inner loop — 3 bright orange nodes (Build, Verify, Ship) -->
      <circle cx="50" cy="0" r="10" fill="url(#dot-orange)"/>
      <circle cx="50" cy="0" r="5" fill="#f0883e"/>
      <circle cx="-25" cy="43" r="10" fill="url(#dot-orange)"/>
      <circle cx="-25" cy="43" r="5" fill="#f0883e"/>
      <circle cx="-25" cy="-43" r="10" fill="url(#dot-orange)"/>
      <circle cx="-25" cy="-43" r="5" fill="#f0883e"/>
      <!-- document + audit + reflect (outer) -->
      <circle cx="78" cy="78" r="8" fill="url(#dot-blue)"/>
      <circle cx="78" cy="78" r="4" fill="#6494be"/>
      <circle cx="-78" cy="78" r="8" fill="url(#dot-blue)"/>
      <circle cx="-78" cy="78" r="4" fill="#6494be"/>
      <!-- feedback arc (audit → build) -->
      <path d="M 78,78 Q 120,0 50,0" fill="none" stroke="#f0883e" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.55"/>
    </g>
    <!-- center glow -->
    <circle r="18" fill="url(#center-glow)"/>
    <text y="5" text-anchor="middle" style="font-family: serif; font-size: 16px; fill: #00e5ff; opacity: 0.7;">σ</text>
  </g>
  <text x="300" y="540" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 4px; font-weight: 600;">PROCESS</text>
  <text x="300" y="564" text-anchor="middle" style="font-family: Georgia, serif; font-size: 15px; fill: #c9d1d9; opacity: 0.7; font-style: italic;">7 phases · one session</text>

  <!-- ─── Center divider ─── -->
  <line x1="600" y1="260" x2="600" y2="560" stroke="#30363d" stroke-width="1" opacity="0.4"/>

  <!-- ─── Right spiral (CONCEPT) ─── -->
  <g transform="translate(900, 400)">
    <!-- 4 ring guides -->
    <circle r="130" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.12"/>
    <circle r="100" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.16"/>
    <circle r="70" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.2"/>
    <circle r="40" fill="none" stroke="#6494be" stroke-width="0.8" opacity="0.28"/>
    <!-- many small dots, mixed colors, distributed -->
    <g>
      <!-- ring 1 (identity core) -->
      <circle cx="0" cy="-40" r="6" fill="url(#dot-blue)"/><circle cx="0" cy="-40" r="3" fill="#6494be"/>
      <circle cx="34" cy="20" r="6" fill="url(#dot-blue)"/><circle cx="34" cy="20" r="3" fill="#6494be"/>
      <circle cx="-34" cy="20" r="6" fill="url(#dot-blue)"/><circle cx="-34" cy="20" r="3" fill="#6494be"/>
      <!-- ring 2 (memory) — some pink sessions -->
      <circle cx="60" cy="-35" r="7" fill="url(#dot-blue)"/><circle cx="60" cy="-35" r="3" fill="#6494be"/>
      <circle cx="-40" cy="-58" r="7" fill="#ff6b9d" opacity="0.9"/>
      <circle cx="-68" cy="18" r="7" fill="url(#dot-blue)"/><circle cx="-68" cy="18" r="3" fill="#6494be"/>
      <circle cx="20" cy="67" r="7" fill="url(#dot-blue)"/><circle cx="20" cy="67" r="3" fill="#6494be"/>
      <circle cx="60" cy="35" r="7" fill="#ff6b9d" opacity="0.9"/>
      <!-- ring 3 (tools) — several green -->
      <circle cx="0" cy="-98" r="7" fill="#50fa7b"/>
      <circle cx="85" cy="-50" r="7" fill="#50fa7b"/>
      <circle cx="100" cy="10" r="7" fill="#50fa7b"/>
      <circle cx="85" cy="70" r="7" fill="#50fa7b"/>
      <circle cx="-60" cy="82" r="7" fill="#50fa7b"/>
      <circle cx="-100" cy="0" r="7" fill="#50fa7b"/>
      <circle cx="-85" cy="-58" r="7" fill="url(#dot-blue)"/><circle cx="-85" cy="-58" r="3" fill="#6494be"/>
      <circle cx="30" cy="-95" r="7" fill="url(#dot-blue)"/><circle cx="30" cy="-95" r="3" fill="#6494be"/>
      <!-- ring 4 (platform + seeds) — mix green + yellow dashed -->
      <circle cx="15" cy="-128" r="6" fill="#50fa7b"/>
      <circle cx="95" cy="-90" r="6" fill="#50fa7b"/>
      <circle cx="128" cy="25" r="6" fill="#50fa7b"/>
      <circle cx="95" cy="90" r="6" fill="#50fa7b"/>
      <circle cx="-30" cy="126" r="6" fill="#50fa7b"/>
      <!-- seeds (yellow, dashed outline) -->
      <circle cx="-95" cy="88" r="6" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="-128" cy="-25" r="6" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="-60" cy="-115" r="6" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <circle cx="65" cy="-112" r="6" fill="none" stroke="#f1fa8c" stroke-width="1.5" stroke-dasharray="2,2"/>
      <!-- glowing backdrops for seeds -->
      <circle cx="-95" cy="88" r="9" fill="url(#dot-yellow)"/>
      <circle cx="-128" cy="-25" r="9" fill="url(#dot-yellow)"/>
      <circle cx="-60" cy="-115" r="9" fill="url(#dot-yellow)"/>
      <circle cx="65" cy="-112" r="9" fill="url(#dot-yellow)"/>
    </g>
    <!-- center glow -->
    <circle r="22" fill="url(#center-glow)"/>
    <text y="6" text-anchor="middle" style="font-family: serif; font-size: 20px; fill: #00e5ff; opacity: 0.8;">σῶμα</text>
  </g>
  <text x="900" y="540" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 4px; font-weight: 600;">CONCEPT</text>
  <text x="900" y="564" text-anchor="middle" style="font-family: Georgia, serif; font-size: 15px; fill: #c9d1d9; opacity: 0.7; font-style: italic;">4 rings · whole project</text>

  <!-- Brand bar -->
  <line x1="60" y1="600" x2="1140" y2="600" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="60" y="620" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 4px; opacity: 0.7;">SOMA</text>
  <text x="1140" y="620" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
