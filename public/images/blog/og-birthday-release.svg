<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Born on April 12 — v0.11.0 release on Curtis's birthday.">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <linearGradient id="cake-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0a06a"/>
      <stop offset="100%" stop-color="#c26a2a"/>
    </linearGradient>
    <radialGradient id="flame-g" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="60%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="rgba(240,136,62,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-g)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.4" fill="#6494be" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Confetti dots -->
  <g opacity="0.5">
    <circle cx="120" cy="80" r="3" fill="#6494be"/>
    <circle cx="200" cy="140" r="2.5" fill="#f0883e"/>
    <circle cx="350" cy="60" r="3.5" fill="#28c840"/>
    <circle cx="480" cy="120" r="2.5" fill="#f0a06a"/>
    <circle cx="900" cy="80" r="3" fill="#6494be"/>
    <circle cx="1050" cy="140" r="3.5" fill="#f0883e"/>
    <circle cx="1130" cy="80" r="2.5" fill="#28c840"/>
    <circle cx="80" cy="500" r="3" fill="#f0883e"/>
    <circle cx="1100" cy="500" r="3" fill="#6494be"/>
    <circle cx="60" cy="400" r="2.5" fill="#28c840"/>
    <circle cx="1140" cy="400" r="2.5" fill="#f0a06a"/>
  </g>

  <!-- ═══ CAKE / version candle composition — right side ═══ -->
  <g transform="translate(800, 250)">
    <!-- Cake top tier -->
    <rect x="0" y="80" width="240" height="120" rx="8" fill="url(#cake-g)" stroke="#c26a2a" stroke-width="2"/>
    <!-- Cake icing drip -->
    <path d="M 0 100 Q 40 110 60 100 Q 80 115 110 100 Q 140 113 170 100 Q 200 110 240 100 L 240 80 L 0 80 Z" 
          fill="#ffe27a" opacity="0.85"/>
    <!-- Single candle in the middle -->
    <rect x="115" y="35" width="10" height="50" rx="2" fill="#e4eaf4"/>
    <!-- Flame -->
    <ellipse cx="120" cy="20" rx="14" ry="22" fill="url(#flame-g)"/>
    <ellipse cx="120" cy="14" rx="6" ry="10" fill="#ffe27a" opacity="0.9"/>

    <!-- Version label inscribed on cake -->
    <text x="120" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#fff" font-weight="700" letter-spacing="-1">v0.11.0</text>
    <text x="120" y="183" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="3">FIRST RELEASE</text>
  </g>

  <!-- HERO TEXT — left -->
  <text x="60" y="120" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #f0883e; letter-spacing: 8px; opacity: 0.85; font-weight: 600;">APRIL 12 · 2026</text>

  <text x="60" y="240" style="font-family: Georgia, serif; font-size: 100px; fill: #e4eaf4; font-weight: 700; letter-spacing: -3px;">Born on</text>
  <text x="60" y="345" style="font-family: Georgia, serif; font-size: 100px; fill: #f0883e; font-weight: 700; letter-spacing: -3px;">April 12.</text>

  <text x="60" y="420" style="font-family: Georgia, serif; font-size: 24px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">v0.11.0 ships on the creator's birthday.</text>
  <text x="60" y="455" style="font-family: Georgia, serif; font-size: 24px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Distribution tiers, Pro scripts, the pledge.</text>

  <!-- Brand -->
  <line x1="60" y1="565" x2="520" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="60" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="1145" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
