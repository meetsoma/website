<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(22,27,34,0.85)"/>
      <stop offset="100%" stop-color="rgba(13,17,23,0.9)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" fill="#c9d1d9" font-size="20" font-weight="600" font-family="'SF Mono', monospace">Soma Body Architecture</text>

  <!-- Agent Brain box -->
  <rect x="280" y="65" width="240" height="56" rx="8" fill="rgba(100,148,190,0.08)" stroke="#6494be" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">System Prompt (_mind.md)</text>
  <text x="400" y="108" text-anchor="middle" fill="#6e7681" font-size="11">Compiles body files into prompt</text>

  <!-- Row 1: Core Identity -->
  <rect x="30" y="145" width="165" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="112" y="170" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">soul.md</text>
  <text x="112" y="190" text-anchor="middle" fill="#6e7681" font-size="10">Who I Am</text>
  <text x="112" y="205" text-anchor="middle" fill="#6494be" font-size="9">always loaded</text>

  <rect x="215" y="145" width="165" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="297" y="170" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">voice.md</text>
  <text x="297" y="190" text-anchor="middle" fill="#6e7681" font-size="10">How I Talk</text>
  <text x="297" y="205" text-anchor="middle" fill="#6494be" font-size="9">always loaded</text>

  <rect x="400" y="145" width="180" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#6494be" stroke-width="1.5"/>
  <text x="490" y="170" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">core_rules.md</text>
  <text x="490" y="190" text-anchor="middle" fill="#8bb9e0" font-size="10" font-style="italic">NEW in 0.29.0</text>
  <text x="490" y="205" text-anchor="middle" fill="#6494be" font-size="9">always loaded</text>

  <rect x="600" y="145" width="170" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="685" y="170" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">body.md</text>
  <text x="685" y="190" text-anchor="middle" fill="#6e7681" font-size="10">Project Context</text>
  <text x="685" y="205" text-anchor="middle" fill="#6494be" font-size="9">always loaded</text>

  <!-- Arrow: brain → row 1 -->
  <line x1="400" y1="121" x2="112" y2="145" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="121" x2="297" y2="145" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="121" x2="490" y2="145" stroke="#6494be" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="400" y1="121" x2="685" y2="145" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Row 2: Session & State -->
  <rect x="30" y="245" width="165" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="112" y="270" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">_memory.md</text>
  <text x="112" y="290" text-anchor="middle" fill="#6e7681" font-size="10">Preload Template</text>
  <text x="112" y="305" text-anchor="middle" fill="#6494be" font-size="9">exhale trigger</text>

  <rect x="215" y="245" width="165" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="297" y="270" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">_boot.md</text>
  <text x="297" y="290" text-anchor="middle" fill="#6e7681" font-size="10">Boot Message</text>
  <text x="297" y="305" text-anchor="middle" fill="#6494be" font-size="9">session start</text>

  <rect x="400" y="245" width="180" height="70" rx="8" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="270" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">_first-breath.md</text>
  <text x="490" y="290" text-anchor="middle" fill="#6e7681" font-size="10">First Session</text>
  <text x="490" y="305" text-anchor="middle" fill="#6494be" font-size="9">one-time</text>

  <!-- Row 3: Lazy / On-demand -->
  <rect x="30" y="345" width="165" height="70" rx="8" fill="rgba(100,148,190,0.04)" stroke="#3a6890" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="112" y="370" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">DNA.md</text>
  <text x="112" y="390" text-anchor="middle" fill="#6e7681" font-size="10">Body Blueprint</text>
  <text x="112" y="405" text-anchor="middle" fill="#f0883e" font-size="9">lazy: true</text>

  <rect x="215" y="345" width="165" height="70" rx="8" fill="rgba(100,148,190,0.04)" stroke="#3a6890" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="297" y="370" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">STATE.md</text>
  <text x="297" y="390" text-anchor="middle" fill="#6e7681" font-size="10">Architecture State</text>
  <text x="297" y="405" text-anchor="middle" fill="#f0883e" font-size="9">lazy: true</text>

  <rect x="400" y="345" width="180" height="70" rx="8" fill="rgba(100,148,190,0.04)" stroke="#3a6890" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="490" y="370" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">journal.md</text>
  <text x="490" y="390" text-anchor="middle" fill="#6e7681" font-size="10">Observations</text>
  <text x="490" y="405" text-anchor="middle" fill="#f0883e" font-size="9">lazy: true</text>

  <rect x="600" y="345" width="170" height="70" rx="8" fill="rgba(100,148,190,0.04)" stroke="#3a6890" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="685" y="370" text-anchor="middle" fill="#c9d1d9" font-size="14" font-family="'SF Mono', monospace">pulse.md</text>
  <text x="685" y="390" text-anchor="middle" fill="#6e7681" font-size="10">Heartbeat Checks</text>
  <text x="685" y="405" text-anchor="middle" fill="#f0883e" font-size="9">lazy: true</text>

  <!-- Section labels -->
  <text x="30" y="136" fill="#6e7681" font-size="10" font-family="'SF Mono', monospace" letter-spacing="1">CORE IDENTITY — always in prompt</text>
  <text x="30" y="236" fill="#6e7681" font-size="10" font-family="'SF Mono', monospace" letter-spacing="1">SESSION LIFECYCLE TEMPLATES</text>
  <text x="30" y="336" fill="#6e7681" font-size="10" font-family="'SF Mono', monospace" letter-spacing="1">LAZY — loaded on demand</text>

  <!-- Legend -->
  <rect x="30" y="440" width="10" height="10" fill="rgba(22,27,34,0.6)" stroke="#30363d" stroke-width="1"/>
  <text x="47" y="450" fill="#6e7681" font-size="9">Content file</text>
  <rect x="160" y="440" width="10" height="10" fill="rgba(22,27,34,0.6)" stroke="#6494be" stroke-width="1.5"/>
  <text x="177" y="450" fill="#6e7681" font-size="9">New / highlighted</text>
  <rect x="330" y="440" width="10" height="10" fill="rgba(100,148,190,0.04)" stroke="#3a6890" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="347" y="450" fill="#6e7681" font-size="9">Lazy (0 context cost)</text>

  <!-- Watermark -->
  <text x="785" y="512" text-anchor="end" fill="rgba(100,148,190,0.12)" font-size="10" font-family="'SF Mono', monospace">σ</text>
</svg>
