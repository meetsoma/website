<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Five Things Had To Go Wrong — cascading failure (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
    <linearGradient id="dom-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(240,136,62,0.15)"/>
      <stop offset="100%" stop-color="rgba(240,136,62,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" stroke="#6494be" stroke-width="0.3" opacity="0.06" fill="none"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#grid)"/>

  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #f0883e; letter-spacing: 5px; opacity: 0.85; font-weight: 600;">CASCADING FAILURE</text>

  <!-- Hero -->
  <text x="300" y="195" text-anchor="middle" style="font-family: Georgia, serif; font-size: 68px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">Five things</text>
  <text x="300" y="270" text-anchor="middle" style="font-family: Georgia, serif; font-size: 68px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">had to go</text>
  <text x="300" y="345" text-anchor="middle" style="font-family: Georgia, serif; font-size: 68px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -2px;">wrong.</text>

  <!-- 5 dominoes stacked with increasing lean -->
  <g transform="translate(110, 440)">
    <!-- Domino 1 — upright -->
    <g>
      <rect x="0" y="0" width="72" height="120" rx="6" fill="url(#dom-g)" stroke="#f0883e" stroke-width="1.5"/>
      <text x="36" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e4eaf4" font-weight="700">1</text>
      <text x="36" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">retina</text>
      <text x="36" y="86" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">pixels</text>
    </g>
    <!-- Domino 2 — leaning 3° -->
    <g transform="translate(94, 0) rotate(3, 36, 60)">
      <rect x="0" y="0" width="72" height="120" rx="6" fill="url(#dom-g)" stroke="#f0883e" stroke-width="1.5"/>
      <text x="36" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e4eaf4" font-weight="700">2</text>
      <text x="36" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">no</text>
      <text x="36" y="86" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">reload</text>
    </g>
    <!-- Domino 3 -->
    <g transform="translate(188, 0) rotate(6, 36, 60)">
      <rect x="0" y="0" width="72" height="120" rx="6" fill="url(#dom-g)" stroke="#f0883e" stroke-width="1.5"/>
      <text x="36" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e4eaf4" font-weight="700">3</text>
      <text x="36" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">accum-</text>
      <text x="36" y="86" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">ulation</text>
    </g>
    <!-- Domino 4 -->
    <g transform="translate(282, 0) rotate(9, 36, 60)">
      <rect x="0" y="0" width="72" height="120" rx="6" fill="url(#dom-g)" stroke="#f0883e" stroke-width="1.5"/>
      <text x="36" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e4eaf4" font-weight="700">4</text>
      <text x="36" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">missing</text>
      <text x="36" y="86" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#c9d1d9" opacity="0.85">class</text>
    </g>
    <!-- Domino 5 — fallen at 18° -->
    <g transform="translate(376, 0) rotate(18, 36, 60)">
      <rect x="0" y="0" width="72" height="120" rx="6" fill="rgba(248,81,73,0.18)" stroke="#f85149" stroke-width="2"/>
      <text x="36" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#f85149" font-weight="700">5</text>
      <text x="36" y="72" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f85149" opacity="0.95" font-weight="700">DEAD</text>
      <text x="36" y="86" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f85149" opacity="0.95" font-weight="700">SESSION</text>
    </g>
  </g>

  <!-- Stats -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="480" height="160" rx="10" fill="rgba(100,148,190,0.05)" stroke="rgba(100,148,190,0.2)" stroke-width="1"/>
    <text x="240" y="44" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e4eaf4" font-style="italic" opacity="0.9">10 megabytes of screenshots.</text>
    <text x="240" y="82" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e4eaf4" font-style="italic" opacity="0.9">37 promises of memory.</text>
    <text x="240" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#f0883e" font-weight="700" font-style="italic">One 400 error.</text>
  </g>

  <!-- Brand -->
  <line x1="100" y1="960" x2="500" y2="960" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="992" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="992" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
