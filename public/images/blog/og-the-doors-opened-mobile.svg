<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="The doors opened — mobile.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="90%">
      <stop offset="0%" stop-color="#131b28"/>
      <stop offset="100%" stop-color="#070a10"/>
    </radialGradient>
    <radialGradient id="light-g" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(240,200,102,0.45)"/>
      <stop offset="40%" stop-color="rgba(240,136,62,0.22)"/>
      <stop offset="100%" stop-color="rgba(240,136,62,0)"/>
    </radialGradient>
    <linearGradient id="portal-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0b880"/>
      <stop offset="50%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#c26a2a"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="#6494be" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="600" height="1020" fill="url(#bg)"/>
  <rect width="600" height="1020" fill="url(#dots)"/>

  <text x="300" y="75" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 9px; opacity: 0.7; font-weight: 600;">SOMA v0.12.0</text>

  <!-- light glow behind door -->
  <ellipse cx="300" cy="430" rx="260" ry="220" fill="url(#light-g)"/>

  <!-- Door centered -->
  <g transform="translate(210, 240)">
    <path d="M 0 400 L 0 120 Q 0 0 90 0 L 90 0 Q 180 0 180 120 L 180 400 Z"
          fill="none" stroke="#30363d" stroke-width="2"/>
    <path d="M 15 400 L 15 130 Q 15 15 90 15 L 90 15 Q 165 15 165 130 L 165 400 Z"
          fill="url(#portal-g)" opacity="0.92"/>
    <path d="M 30 400 L 30 140 Q 30 35 90 35 L 90 35 Q 150 35 150 140 L 150 400 Z"
          fill="rgba(255,240,200,0.35)"/>
    <line x1="15" y1="130" x2="15" y2="400" stroke="#ffd7a8" stroke-width="1.5" opacity="0.6"/>
    <line x1="165" y1="130" x2="165" y2="400" stroke="#ffd7a8" stroke-width="1.5" opacity="0.6"/>
    <circle cx="90" cy="340" r="8" fill="#0a0d14" opacity="0.55"/>
    <rect x="83" y="348" width="14" height="26" rx="3" fill="#0a0d14" opacity="0.55"/>
  </g>

  <!-- Hero text below door -->
  <text x="300" y="720" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -2px;">The doors</text>
  <text x="300" y="790" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #f0883e; font-weight: 700; letter-spacing: -2px;">opened.</text>

  <text x="300" y="860" text-anchor="middle" style="font-family: Georgia, serif; font-size: 18px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Your data stays on your machine.</text>
  <text x="300" y="886" text-anchor="middle" style="font-family: Georgia, serif; font-size: 18px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">The hub is just the pipe.</text>

  <!-- Brand -->
  <line x1="100" y1="940" x2="500" y2="940" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <text x="100" y="985" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="985" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 12px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
