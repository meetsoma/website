<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Show the Machinery — Soma wireframe with annotation arrows (mobile).">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="40%" r="85%">
      <stop offset="0%" stop-color="#15172a"/>
      <stop offset="100%" stop-color="#070810"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bgM)"/>
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" stroke="#6494be" stroke-width="0.3" opacity="0.08" fill="none"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#grid)"/>
  <defs>
    <marker id="arrowM" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#f0883e"/>
    </marker>
  </defs>

  <text x="300" y="90" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 6px; opacity: 0.8; font-weight: 600;">DESIGN PHILOSOPHY</text>

  <text x="300" y="190" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">Show the</text>
  <text x="300" y="262" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #f0883e; font-style: italic; font-weight: 700; letter-spacing: -1.5px;">Machinery.</text>

  <!-- Wireframe Soma — center -->
  <g transform="translate(180, 380)">
    <!-- Guide lines -->
    <line x1="120" y1="0" x2="120" y2="240" stroke="#6494be" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.35"/>
    <line x1="0" y1="120" x2="240" y2="120" stroke="#6494be" stroke-width="0.5" stroke-dasharray="3,5" opacity="0.35"/>
    <!-- Body (wireframe) -->
    <circle cx="120" cy="120" r="100" fill="rgba(100,148,190,0.05)" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.6"/>
    <!-- Eyes (only real fill) -->
    <circle cx="95" cy="108" r="14" fill="rgba(255,255,255,0.85)" stroke="#c9d1d9" stroke-width="1"/>
    <circle cx="145" cy="108" r="14" fill="rgba(255,255,255,0.85)" stroke="#c9d1d9" stroke-width="1"/>
    <circle cx="95" cy="110" r="5" fill="#0e1a26"/>
    <circle cx="145" cy="110" r="5" fill="#0e1a26"/>
    <!-- Smile wireframe -->
    <path d="M 100 150 Q 120 162 140 150" fill="none" stroke="#c9d1d9" stroke-width="1.5" opacity="0.6"/>
    <!-- Moon (wireframe) -->
    <circle cx="198" cy="30" r="30" fill="rgba(100,148,190,0.05)" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
    <!-- Arms/feet (wireframe) -->
    <circle cx="10" cy="130" r="22" fill="none" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45"/>
    <circle cx="230" cy="130" r="22" fill="none" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45"/>
    <circle cx="80" cy="226" r="18" fill="none" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45"/>
    <circle cx="160" cy="226" r="18" fill="none" stroke="#6494be" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.45"/>
  </g>

  <!-- Annotation labels with arrows — 4 corners -->
  <g font-family="'SF Mono', monospace">
    <!-- soul.md → left eye area -->
    <line x1="110" y1="420" x2="265" y2="475" stroke="#f0883e" stroke-width="1.2" opacity="0.85" marker-end="url(#arrowM)"/>
    <text x="80" y="405" font-size="14" fill="#f0883e" font-weight="600" letter-spacing="1">soul.md</text>
    <text x="80" y="422" font-size="10" fill="#c9d1d9" opacity="0.65">identity</text>

    <!-- journal.md → moon -->
    <line x1="490" y1="400" x2="410" y2="420" stroke="#f0883e" stroke-width="1.2" opacity="0.85" marker-end="url(#arrowM)"/>
    <text x="400" y="388" font-size="14" fill="#f0883e" font-weight="600" letter-spacing="1">journal.md</text>
    <text x="400" y="405" font-size="10" fill="#c9d1d9" opacity="0.65">what she noticed</text>

    <!-- voice.md → smile -->
    <line x1="110" y1="640" x2="280" y2="540" stroke="#f0883e" stroke-width="1.2" opacity="0.85" marker-end="url(#arrowM)"/>
    <text x="80" y="660" font-size="14" fill="#f0883e" font-weight="600" letter-spacing="1">voice.md</text>
    <text x="80" y="677" font-size="10" fill="#c9d1d9" opacity="0.65">how I sound</text>

    <!-- body.md → foot -->
    <line x1="490" y1="640" x2="360" y2="625" stroke="#f0883e" stroke-width="1.2" opacity="0.85" marker-end="url(#arrowM)"/>
    <text x="400" y="660" font-size="14" fill="#f0883e" font-weight="600" letter-spacing="1">body.md</text>
    <text x="400" y="677" font-size="10" fill="#c9d1d9" opacity="0.65">working context</text>
  </g>

  <!-- Subtext -->
  <text x="300" y="790" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Trust isn't built by promises.</text>
  <text x="300" y="825" text-anchor="middle" style="font-family: Georgia, serif; font-size: 22px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">It's built by legibility.</text>

  <!-- Brand -->
  <line x1="100" y1="945" x2="500" y2="945" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="100" y="980" style="font-family: 'SF Mono', monospace; font-size: 16px; fill: #6494be; opacity: 0.7; letter-spacing: 4px;">SOMA</text>
  <text x="500" y="980" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
