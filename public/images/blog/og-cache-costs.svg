<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="body-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec-g" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec-g" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .title-text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 44px; fill: #c9d1d9; font-weight: 700; letter-spacing: -0.5px; }
    .subtitle-text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 22px; fill: #6e7681; }
    .stat-num { font-family: 'SF Mono', monospace; font-size: 48px; font-weight: 700; }
    .stat-label { font-family: -apple-system, sans-serif; font-size: 14px; fill: #6e7681; }
    .brand { font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; opacity: 0.8; letter-spacing: 2px; }
    .sigma { font-family: 'Times New Roman', serif; font-size: 28px; fill: #6494be; opacity: 0.6; }
    .quote { font-family: 'SF Mono', monospace; font-size: 15px; fill: #f0883e; opacity: 0.9; }
    .claw-text { font-family: 'SF Mono', monospace; font-size: 18px; fill: #6e7681; letter-spacing: 3px; }
  </style>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.5" fill="#6494be" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Title area (left side) -->
  <text x="80" y="110" class="title-text">Why Your Claude Code</text>
  <text x="80" y="165" class="title-text">Bill Spiked</text>
  <text x="80" y="210" class="subtitle-text">The 5-minute fix nobody's talking about</text>

  <!-- Crossed out "CLAW CODE" joke -->
  <text x="80" y="260" class="claw-text" opacity="0.4">CLAW CODE</text>
  <line x1="76" y1="254" x2="250" y2="254" stroke="#6e7681" stroke-width="1.5" opacity="0.4"/>

  <!-- Stats boxes -->
  <g transform="translate(80, 300)">
    <rect x="0" y="0" width="175" height="100" rx="10" stroke="#30363d" fill="rgba(22,27,34,0.7)"/>
    <text x="87" y="50" text-anchor="middle" class="stat-num" fill="#f0883e">10×</text>
    <text x="87" y="75" text-anchor="middle" class="stat-label">cache miss cost</text>
  </g>

  <g transform="translate(280, 300)">
    <rect x="0" y="0" width="175" height="100" rx="10" stroke="#30363d" fill="rgba(22,27,34,0.7)"/>
    <text x="87" y="50" text-anchor="middle" class="stat-num" fill="#f0883e">5min</text>
    <text x="87" y="75" text-anchor="middle" class="stat-label">cache TTL</text>
  </g>

  <g transform="translate(480, 300)">
    <rect x="0" y="0" width="175" height="100" rx="10" stroke="#30363d" fill="rgba(22,27,34,0.7)"/>
    <text x="87" y="50" text-anchor="middle" class="stat-num" fill="#6494be">80%</text>
    <text x="87" y="75" text-anchor="middle" class="stat-label">savings with keepalive</text>
  </g>

  <!-- Reddit quote -->
  <text x="80" y="450" class="quote">"I'm afraid to ask Claude a question."</text>
  <text x="80" y="475" class="stat-label">— r/ClaudeAI, 384 upvotes</text>

  <!-- ═══ MASCOT (right side) — with sunglasses ═══ -->
  <g transform="translate(780, 160) scale(1.4)">
    <!-- Planet body -->
    <circle cx="170" cy="170" r="120" fill="url(#body-g)"/>
    <circle cx="170" cy="170" r="120" fill="url(#spec-g)"/>

    <!-- Sunglasses frame -->
    <rect x="95" y="140" width="65" height="40" rx="8" fill="#12202e" stroke="#0a1520" stroke-width="2"/>
    <rect x="170" y="138" width="65" height="40" rx="8" fill="#12202e" stroke="#0a1520" stroke-width="2"/>
    <!-- Bridge -->
    <path d="M160,158 Q167,150 170,158" fill="none" stroke="#0a1520" stroke-width="3"/>
    <!-- Left arm -->
    <line x1="95" y1="155" x2="60" y2="148" stroke="#0a1520" stroke-width="3" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="235" y1="153" x2="270" y2="146" stroke="#0a1520" stroke-width="3" stroke-linecap="round"/>
    <!-- Lens shine -->
    <rect x="100" y="145" width="18" height="8" rx="3" fill="white" opacity="0.08"/>
    <rect x="175" y="143" width="18" height="8" rx="3" fill="white" opacity="0.08"/>

    <!-- Smile — wider, confident -->
    <path d="M145,210 Q170,230 195,210" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

    <!-- Moon — with tiny sunglasses too -->
    <circle cx="270" cy="70" r="44" fill="url(#moon-g)"/>
    <circle cx="270" cy="70" r="44" fill="url(#moon-spec-g)"/>
    <!-- Moon sunglasses (tiny) -->
    <rect x="248" y="62" width="20" height="14" rx="3" fill="#12202e" stroke="#0a1520" stroke-width="1.2"/>
    <rect x="272" y="61" width="20" height="14" rx="3" fill="#12202e" stroke="#0a1520" stroke-width="1.2"/>
    <path d="M268,68 Q270,65 272,68" fill="none" stroke="#0a1520" stroke-width="1.5"/>
    <line x1="248" y1="68" x2="238" y2="65" stroke="#0a1520" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="292" y1="67" x2="302" y2="64" stroke="#0a1520" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Keepalive hearts floating near mascot -->
  <text x="820" y="160" style="font-size: 20px; fill: #f0883e; opacity: 0.6;">&#9829;</text>
  <text x="870" y="130" style="font-size: 14px; fill: #f0883e; opacity: 0.4;">&#9829;</text>
  <text x="1100" y="440" style="font-size: 16px; fill: #f0883e; opacity: 0.5;">&#9829;</text>
  <text x="1050" y="480" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; opacity: 0.6;">♥ 5/5</text>

  <!-- Brand footer -->
  <text x="80" y="590" class="brand">SOMA</text>
  <text x="1120" y="590" text-anchor="end" class="brand">soma.gravicity.ai</text>
  <text x="1140" y="555" text-anchor="end" class="sigma">σ</text>
</svg>