<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="$5 for a Chat, $0.40 for the Same Answer">
  <defs>
    <radialGradient id="bg-glow-m" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#182030"/>
      <stop offset="100%" stop-color="#0b0f15"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg-glow-m)"/>
  <pattern id="dots-m" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.3" fill="#6494be" opacity="0.06"/>
  </pattern>
  <rect width="600" height="600" fill="url(#dots-m)"/>

  <!-- Hero -->
  <text x="55" y="120" style="font-family: Georgia, serif; font-size: 48px; fill: #c9d1d9; font-weight: 600;">
    <tspan x="55" dy="0">$5 for a Chat,</tspan>
    <tspan x="55" dy="56" fill="#6494be">$0.40 for the</tspan>
    <tspan x="55" dy="56">Same Answer</tspan>
  </text>

  <!-- Subtitle -->
  <text x="55" y="300" style="font-family: -apple-system, sans-serif; font-size: 16px; fill: #6e7681;">
    <tspan x="55" dy="0">Most models cost 90% less than</tspan>
    <tspan x="55" dy="26">the one you default to.</tspan>
    <tspan x="55" dy="26">And they work the same.</tspan>
  </text>

  <!-- Price bars compact -->
  <g transform="translate(55, 370)">
    <text x="0" y="0" style="font-family: 'SF Mono', monospace; font-size: 10px; fill: #6e7681; letter-spacing: 1px;">OUTPUT TOKENS / 1M</text>
    <text x="0" y="28" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">Opus 4.7</text><text x="490" y="28" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">$25</text>
    <text x="0" y="50" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">Sonnet 4.6</text><text x="490" y="50" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">$15</text>
    <text x="0" y="72" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #f0883e;">Qwen3.7 Plus ★</text><text x="490" y="72" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #8bb9e0;">$1.60</text>
    <text x="0" y="94" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #f0883e;">DeepSeek Flash</text><text x="490" y="94" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">$0.28</text>
    <text x="0" y="116" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681;">Free models</text><text x="490" y="116" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681;">$0</text>
  </g>

  <text x="55" y="555" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; opacity: 0.6; letter-spacing: 2px;">SOMA</text>
  <text x="545" y="555" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 11px; fill: #6e7681; opacity: 0.5;">soma.gravicity.ai</text>
</svg>