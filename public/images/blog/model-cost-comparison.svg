<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-label="Model cost comparison bar chart">
  <defs>
    <linearGradient id="opus-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6494be"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sweet-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0883e"/>
      <stop offset="100%" stop-color="#f0883e" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="plus-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8bb9e0"/>
      <stop offset="100%" stop-color="#8bb9e0" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="free-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6e7681"/>
      <stop offset="100%" stop-color="#6e7681" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="720" height="400" fill="rgba(22,27,34,0.7)" rx="8" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9; letter-spacing: 2px;">COST PER 1M OUTPUT TOKENS (LOG SCALE)</text>

  <!-- Claude Opus 4.7 -->
  <text x="80" y="75" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">Claude Opus 4.7</text>
  <rect x="80" y="82" width="550" height="22" rx="3" fill="rgba(100,148,190,0.08)" stroke="#30363d" stroke-width="0.5"/>
  <rect x="80" y="82" width="550" height="22" rx="3" fill="url(#opus-g)"/>
  <text x="640" y="97" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9; font-weight: 600;">$25.00</text>

  <!-- GPT 5.5 -->
  <text x="80" y="120" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">GPT 5.5</text>
  <rect x="80" y="127" width="550" height="22" rx="3" fill="rgba(100,148,190,0.08)" stroke="#30363d" stroke-width="0.5"/>
  <rect x="80" y="127" width="550" height="22" rx="3" fill="url(#opus-g)" opacity="0.8"/>
  <text x="640" y="142" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9; font-weight: 600;">$30.00</text>

  <!-- Claude Sonnet 4.6 -->
  <text x="80" y="165" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">Claude Sonnet 4.6</text>
  <rect x="80" y="172" width="550" height="22" rx="3" fill="rgba(100,148,190,0.08)" stroke="#30363d" stroke-width="0.5"/>
  <rect x="80" y="172" width="310" height="22" rx="3" fill="url(#opus-g)" opacity="0.55"/>
  <text x="640" y="187" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9; font-weight: 600;">$15.00</text>

  <!-- Gemini 3.5 Flash -->
  <text x="80" y="210" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">Gemini 3.5 Flash</text>
  <rect x="80" y="217" width="550" height="22" rx="3" fill="rgba(240,136,62,0.06)" stroke="#30363d" stroke-width="0.5"/>
  <rect x="80" y="217" width="186" height="22" rx="3" fill="url(#sweet-g)"/>
  <text x="640" y="232" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">$9.00</text>

  <!-- Qwen3.7 Plus ⭐ -->
  <text x="80" y="258" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">Qwen3.7 Plus  ★</text>
  <rect x="80" y="265" width="550" height="22" rx="3" fill="rgba(139,185,224,0.08)" stroke="#6494be" stroke-width="0.5"/>
  <rect x="80" y="265" width="33" height="22" rx="3" fill="url(#plus-g)"/>
  <text x="640" y="280" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #8bb9e0; font-weight: 600;">$1.60</text>

  <!-- DeepSeek V4 Flash -->
  <text x="80" y="305" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #c9d1d9;">DeepSeek V4 Flash</text>
  <rect x="80" y="312" width="550" height="22" rx="3" fill="rgba(240,136,62,0.04)" stroke="#30363d" stroke-width="0.5"/>
  <rect x="80" y="312" width="6" height="22" rx="3" fill="url(#sweet-g)" opacity="0.6"/>
  <text x="640" y="327" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #c9d1d9;">$0.28</text>

  <!-- Free tier -->
  <text x="80" y="353" style="font-family: -apple-system, sans-serif; font-size: 13px; fill: #6e7681;">Free models (Big Pickle, MiMo, Nemotron, DeepSeek Free)</text>
  <rect x="80" y="360" width="550" height="22" rx="3" fill="rgba(110,118,129,0.04)" stroke="#30363d" stroke-width="0.5"/>
  <text x="640" y="375" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; font-style: italic;">$0.00</text>
</svg>