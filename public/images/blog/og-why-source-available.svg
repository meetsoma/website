<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Why we're going source-available — MIT to BSL 1.1.">
  <defs>
    <linearGradient id="bg-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101622"/>
      <stop offset="100%" stop-color="#070a10"/>
    </linearGradient>
    <linearGradient id="bridge-g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6494be"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-g)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.4" fill="#6494be" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Supra label -->
  <text x="600" y="100" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 12px; opacity: 0.7; font-weight: 600;">LICENSING NOTE</text>

  <!-- ═══ TWO LICENSE BADGES with arrow between ═══ -->
  <!-- Left badge: MIT (faded) -->
  <g transform="translate(140, 230)">
    <rect x="0" y="0" width="280" height="160" rx="14" fill="#1a2535" stroke="#30363d" stroke-width="2" opacity="0.7"/>
    <text x="140" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#6e7681" letter-spacing="4">FROM</text>
    <text x="140" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="64" fill="#c9d1d9" font-weight="700" letter-spacing="-1" opacity="0.65">MIT</text>
    <text x="140" y="145" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#6e7681" opacity="0.7">permissive</text>
  </g>

  <!-- Bridge / arrow -->
  <line x1="450" y1="310" x2="750" y2="310" stroke="url(#bridge-g)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="750,300 770,310 750,320" fill="#f0883e"/>
  <text x="600" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#c9d1d9" font-style="italic" opacity="0.75">a deliberate move</text>

  <!-- Right badge: BSL 1.1 (highlighted) -->
  <g transform="translate(780, 230)">
    <rect x="0" y="0" width="280" height="160" rx="14" fill="#1a2a3a" stroke="#f0883e" stroke-width="2.5"/>
    <text x="140" y="50" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#f0883e" letter-spacing="4" font-weight="600">TO</text>
    <text x="140" y="115" text-anchor="middle" font-family="Georgia, serif" font-size="56" fill="#e4eaf4" font-weight="700" letter-spacing="-1">BSL 1.1</text>
    <text x="140" y="145" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#f0883e" opacity="0.85">source-available</text>
  </g>

  <!-- HERO TITLE -->
  <text x="600" y="180" text-anchor="middle" style="font-family: Georgia, serif; font-size: 56px; fill: #e4eaf4; font-weight: 700; letter-spacing: -1.5px;">Why We're Going Source-Available.</text>

  <!-- Subtext -->
  <text x="600" y="470" text-anchor="middle" style="font-family: Georgia, serif; font-size: 24px; fill: #c9d1d9; font-style: italic; opacity: 0.85;">Free for use. Open to read. Protected from extraction.</text>
  <text x="600" y="510" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 4px; opacity: 0.65;">CONVERTS TO MIT AFTER FOUR YEARS</text>

  <!-- Brand -->
  <line x1="60" y1="565" x2="520" y2="565" stroke="#30363d" stroke-width="1" opacity="0.6"/>
  <text x="60" y="597" style="font-family: 'SF Mono', monospace; font-size: 15px; fill: #6494be; opacity: 0.65; letter-spacing: 3px;">SOMA</text>
  <text x="1145" y="597" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6e7681; opacity: 0.6;">soma.gravicity.ai</text>
</svg>
