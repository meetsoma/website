<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Team Soma — eight specialized children coordinated by a parent agent">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a2230"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(240,200,102,0.22)"/>
      <stop offset="70%" stop-color="rgba(240,200,102,0.04)"/>
      <stop offset="100%" stop-color="rgba(240,200,102,0)"/>
    </radialGradient>
    <filter id="paneShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
      <feColorMatrix values="0 0 0 0 0.486   0 0 0 0 0.698   0 0 0 0 0.831   0 0 0 0.12 0"/>
    </filter>
    <symbol id="pane" viewBox="0 0 240 96">
      <rect x="0.5" y="0.5" width="239" height="95" rx="11" fill="rgba(20,25,34,0.72)" stroke="rgba(124,178,212,0.22)"/>
      <rect x="0.5" y="0.5" width="239" height="22" rx="11" fill="rgba(12,15,22,0.55)"/>
      <rect x="0.5" y="11" width="239" height="11.5" fill="rgba(12,15,22,0.55)"/>
      <g transform="translate(10,9)" fill="rgba(124,178,212,0.35)">
        <rect width="3" height="3" rx="0.5"/><rect x="5" width="3" height="3" rx="0.5"/><rect x="10" width="3" height="3" rx="0.5"/>
        <rect y="5" width="3" height="3" rx="0.5"/><rect x="5" y="5" width="3" height="3" rx="0.5"/><rect x="10" y="5" width="3" height="3" rx="0.5"/>
      </g>
      <line x1="0" y1="22" x2="240" y2="22" stroke="rgba(124,178,212,0.1)"/>
    </symbol>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.04" stroke="#7cb2d4" stroke-width="1">
    <path d="M 0 100 L 1200 100 M 0 210 L 1200 210 M 0 420 L 1200 420 M 0 530 L 1200 530"/>
    <path d="M 200 0 L 200 630 M 450 0 L 450 630 M 750 0 L 750 630 M 1000 0 L 1000 630"/>
  </g>

  <!-- wires from center to each child -->
  <g stroke="rgba(124,178,212,0.18)" stroke-width="1.2" fill="none" stroke-dasharray="3 4">
    <path d="M 600 315 L 150 160"/>
    <path d="M 600 315 L 420 160"/>
    <path d="M 600 315 L 780 160"/>
    <path d="M 600 315 L 1050 160"/>
    <path d="M 600 315 L 150 470"/>
    <path d="M 600 315 L 420 470"/>
    <path d="M 600 315 L 780 470"/>
    <path d="M 600 315 L 1050 470"/>
  </g>

  <circle cx="600" cy="315" r="180" fill="url(#centerGlow)"/>

  <!-- ── TOP ROW (4 panes) ── -->
  <g transform="translate(30,112)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">VERIFIER</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">read-only</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-haiku-4-5</text>
  </g>
  <g transform="translate(300,112)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">BUILDER</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">write · edit · run</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-sonnet-4-6</text>
  </g>
  <g transform="translate(660,112)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">CURATOR</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">closes the loop</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-sonnet-4-6</text>
  </g>
  <g transform="translate(930,112)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">AUDITOR</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">post-release review</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-opus-4-6</text>
  </g>

  <!-- ── PARENT (center) ── -->
  <g transform="translate(450,240)">
    <rect x="0.5" y="0.5" width="299" height="149" rx="14" fill="rgba(20,25,34,0.85)" stroke="rgba(240,200,102,0.42)" stroke-width="1.2" filter="url(#paneShadow)"/>
    <rect x="0.5" y="0.5" width="299" height="28" rx="14" fill="rgba(12,15,22,0.7)"/>
    <rect x="0.5" y="14" width="299" height="14.5" fill="rgba(12,15,22,0.7)"/>
    <g transform="translate(14,11)" fill="rgba(240,200,102,0.55)">
      <rect width="3" height="3" rx="0.5"/><rect x="5" width="3" height="3" rx="0.5"/><rect x="10" width="3" height="3" rx="0.5"/>
      <rect y="5" width="3" height="3" rx="0.5"/><rect x="5" y="5" width="3" height="3" rx="0.5"/><rect x="10" y="5" width="3" height="3" rx="0.5"/>
    </g>
    <line x1="0" y1="28" x2="300" y2="28" stroke="rgba(240,200,102,0.2)"/>
    <text x="34" y="20" fill="#f0c866" font-family="\'Satoshi\',system-ui" font-size="11" font-weight="700" letter-spacing="0.5">PARENT · SOMA</text>
    <text x="150" y="82" text-anchor="middle" fill="#f0c866" font-family="\'Manrope\',system-ui" font-size="48" font-weight="800">σ</text>
    <text x="150" y="116" text-anchor="middle" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="14" font-weight="600">orchestrator</text>
    <text x="150" y="136" text-anchor="middle" fill="#9dafc4" font-family="ui-monospace,monospace" font-size="10" opacity="0.8">claude-opus-4-7</text>
  </g>

  <!-- ── BOTTOM ROW (4 panes) ── -->
  <g transform="translate(30,422)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">PLANNER</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">cold-read tasks</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-opus-4-7</text>
  </g>
  <g transform="translate(300,422)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">DOC_WRITER</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">wrote this post</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-sonnet-4-6</text>
  </g>
  <g transform="translate(660,422)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">REFLECTOR</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">runs the MLR cycle</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="10" opacity="0.85">claude-sonnet-4-6</text>
  </g>
  <g transform="translate(930,422)"><use href="#pane" width="240" height="96"/>
    <text x="28" y="16" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="9.5" font-weight="600" letter-spacing="0.4">GENERAL</text>
    <text x="20" y="52" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="15" font-weight="700">default · does everything</text>
    <text x="20" y="76" fill="#7cb2d4" font-family="ui-monospace,monospace" font-size="11" opacity="0.85">any model</text>
  </g>

  <g transform="translate(600,580)">
    <text text-anchor="middle" fill="#e4eaf4" font-family="\'Satoshi\',system-ui" font-size="22" font-weight="700" letter-spacing="-0.4">Team Soma</text>
    <text y="24" text-anchor="middle" fill="#9dafc4" font-family="\'Satoshi\',system-ui" font-size="12" letter-spacing="0.3" opacity="0.85">One agent became eight · v0.20.x · meetsoma</text>
  </g>
</svg>
