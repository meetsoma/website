<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1020" width="600" height="1020" role="img" aria-label="Let Pi Compile — we didn't. Mobile.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="body-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec-g" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="1020" fill="url(#bg)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="34" height="34" patternUnits="userSpaceOnUse">
    <circle cx="17" cy="17" r="0.4" fill="#6494be" opacity="0.08"/>
  </pattern>
  <rect width="600" height="1020" fill="url(#dots)"/>

  <!-- Category -->
  <text x="300" y="80" text-anchor="middle" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 7px; opacity: 0.8; font-weight: 600;">ARCHITECTURE · POST-MORTEM</text>

  <!-- Hero line 1: "Let Pi Compile." struck through -->
  <g>
    <text x="300" y="190" text-anchor="middle" style="font-family: Georgia, serif; font-size: 64px; fill: #c9d1d9; font-weight: 700; letter-spacing: -1.6px; opacity: 0.55;">Let Pi Compile.</text>
    <line x1="80" y1="170" x2="520" y2="170" stroke="#f0883e" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- Crack flourishes -->
    <path d="M160,150 L170,180 L155,200" fill="none" stroke="#f0883e" stroke-width="1.6" opacity="0.6"/>
    <path d="M310,148 L318,182 L300,205" fill="none" stroke="#f0883e" stroke-width="1.4" opacity="0.5"/>
    <path d="M430,155 L425,195" fill="none" stroke="#f0883e" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- Hero line 2: "We didn't." italic orange -->
  <text x="300" y="290" text-anchor="middle" style="font-family: Georgia, serif; font-size: 78px; fill: #f0883e; font-weight: 700; font-style: italic; letter-spacing: -1.6px;">We didn't.</text>

  <!-- ═══ MASCOT — center, smaller for mobile ═══ -->
  <g transform="translate(195, 365) scale(1.0)">
    <circle cx="105" cy="105" r="100" fill="url(#body-g)"/>
    <circle cx="105" cy="105" r="100" fill="url(#spec-g)"/>

    <rect x="38" y="80" width="60" height="38" rx="9" fill="#0e1a26" stroke="#080f18" stroke-width="2.5"/>
    <rect x="106" y="78" width="60" height="38" rx="9" fill="#0e1a26" stroke="#080f18" stroke-width="2.5"/>
    <path d="M98,97 Q104,87 108,97" fill="none" stroke="#080f18" stroke-width="3"/>
    <line x1="38" y1="96" x2="8" y2="89" stroke="#080f18" stroke-width="3" stroke-linecap="round"/>
    <line x1="166" y1="95" x2="194" y2="88" stroke="#080f18" stroke-width="3" stroke-linecap="round"/>
    <rect x="44" y="86" width="16" height="8" rx="3" fill="white" opacity="0.06"/>
    <rect x="112" y="85" width="16" height="8" rx="3" fill="white" opacity="0.06"/>

    <!-- Smirk -->
    <path d="M75,148 Q105,170 138,144" fill="none" stroke="white" stroke-width="4.2" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- ═══ TIMELINE — three timestamps, stacked, centered ═══ -->
  <g transform="translate(60, 660)">
    <!-- 21:18 -->
    <text x="0" y="0" style="font-family: 'SF Mono', monospace; font-size: 24px; font-weight: 600; fill: #6494be; letter-spacing: 1px;">21:18</text>
    <text x="120" y="0" style="font-family: -apple-system, sans-serif; font-size: 22px; fill: #c9d1d9;">shipped Pi-native</text>

    <!-- 23:15 — pivot -->
    <text x="0" y="50" style="font-family: 'SF Mono', monospace; font-size: 24px; font-weight: 600; fill: #f0883e; letter-spacing: 1px;">23:15</text>
    <text x="120" y="50" style="font-family: -apple-system, sans-serif; font-size: 22px; fill: #c9d1d9;">Curtis reverted</text>

    <!-- 23:17 -->
    <text x="0" y="100" style="font-family: 'SF Mono', monospace; font-size: 24px; font-weight: 600; fill: #6494be; letter-spacing: 1px;">23:17</text>
    <text x="120" y="100" style="font-family: -apple-system, sans-serif; font-size: 22px; fill: #c9d1d9;">_mind.md restored</text>
  </g>

  <!-- Pull quote / lesson -->
  <text x="300" y="870" text-anchor="middle" style="font-family: Georgia, serif; font-size: 20px; fill: #8bb9e0; font-style: italic; opacity: 0.85;">plan. promise. code.</text>
  <text x="300" y="900" text-anchor="middle" style="font-family: Georgia, serif; font-size: 18px; fill: #6e7681; font-style: italic;">two of three is not enough.</text>

  <!-- Brand bar -->
  <line x1="60" y1="965" x2="540" y2="965" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="995" style="font-family: 'SF Mono', monospace; font-size: 14px; fill: #6494be; letter-spacing: 2px; opacity: 0.85;">SOMA</text>
  <text x="540" y="995" text-anchor="end" style="font-family: 'SF Mono', monospace; font-size: 13px; fill: #6494be; letter-spacing: 1.5px; opacity: 0.7;">soma.gravicity.ai</text>
  <text x="300" y="995" text-anchor="middle" style="font-family: Georgia, serif; font-size: 18px; fill: #6494be; opacity: 0.5;">σ</text>
</svg>
