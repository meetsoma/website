<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="body" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fff5d4"/>
      <stop offset="35%" stop-color="#ffd88a"/>
      <stop offset="70%" stop-color="#f0a868"/>
      <stop offset="100%" stop-color="#c47852"/>
    </radialGradient>
    <radialGradient id="ray" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd88a"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="rayShort" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe6aa"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0.45"/>
    </radialGradient>
    <radialGradient id="spec" cx="30%" cy="22%" r="22%">
      <stop offset="0%" stop-color="white" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="40%" stop-color="#e8a87c" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lens" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#3a5a8c"/>
      <stop offset="35%"  stop-color="#5a7eaa"/>
      <stop offset="65%"  stop-color="#9ab4d0"/>
      <stop offset="100%" stop-color="#e0ecf6"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f08858" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f08858" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="200" cy="200" r="200" fill="url(#halo)"/>

  <!-- Sun rays -->
  <g transform="translate(200,200)">
    <g fill="url(#ray)" opacity="0.92">
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(0)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(30)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(60)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(90)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(120)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(150)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(180)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(210)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(240)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(270)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(300)"/>
      <polygon points="0,-198 -11,-160 11,-160" transform="rotate(330)"/>
    </g>
    <g fill="url(#rayShort)" opacity="0.75">
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(15)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(45)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(75)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(105)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(135)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(165)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(195)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(225)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(255)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(285)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(315)"/>
      <polygon points="0,-178 -7,-159 7,-159" transform="rotate(345)"/>
    </g>
  </g>

  <circle cx="200" cy="200" r="150" fill="url(#body)"/>
  <ellipse cx="135" cy="252" rx="32" ry="18" fill="url(#cheek)"/>
  <ellipse cx="265" cy="252" rx="32" ry="18" fill="url(#cheek)"/>
  <circle cx="200" cy="200" r="150" fill="url(#spec)"/>

  <!-- ═══ TRACED RAY-BAN AVIATORS — extracted from reference photo ═══ -->
  <svg x="74" y="170" width="252" height="106" viewBox="173 513 1054 441" preserveAspectRatio="xMidYMid meet">
    <path d="M 412.00,515.20 c -134.20,6.00 -209.10,49.80 -226.90,132.60 -1.10,5.10 -3.90,13.40 -6.20,18.50 -5.40,12.00 -6.20,19.80 -2.90,30.70 1.90,6.60 2.30,10.90 3.00,35.50 2.20,75.40 21.10,117.50 68.60,153.10 91.10,68.20 224.20,11.70 331.30,-140.60 21.40,-30.30 24.00,-34.40 32.90,-52.50 20.50,-41.40 24.60,-54.20 24.60,-78.00 0.00,-55.30 -40.60,-83.30 -139.00,-96.00 -17.10,-2.20 -25.20,-2.70 -57.90,-3.80 -4.90,-0.20 -17.30,-0.00 -27.50,0.50 z" fill="url(#lens)" stroke="#a0a6ae" stroke-width="9"/>
    <path d="M 945.50,514.60 c -175.20,8.60 -222.20,70.70 -147.40,194.90 76.70,127.50 192.60,213.90 275.80,205.50 90.50,-9.10 143.30,-73.10 146.10,-177.00 0.70,-28.10 0.90,-29.90 3.40,-38.00 4.00,-12.50 3.40,-21.20 -2.20,-34.10 -2.30,-5.20 -5.30,-14.30 -6.60,-20.10 -16.20,-68.50 -64.90,-106.60 -159.70,-124.70 -25.80,-4.90 -78.20,-8.10 -109.40,-6.50 z" fill="url(#lens)" stroke="#a0a6ae" stroke-width="9"/>
  </svg>

  <!-- BROW BAR — straight bar across the top of both lenses -->
  <line x1="92" y1="178" x2="200" y2="178"
        stroke="#a0a6ae" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="178" x2="308" y2="178"
        stroke="#a0a6ae" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bridge — small arch -->
  <path d="M 188,184 Q 200,194 212,184"
        fill="none" stroke="#a0a6ae" stroke-width="2"
        stroke-linecap="round"/>

  <!-- Earpieces -->
  <path d="M 76,210 Q 54,196 36,194"
        fill="none" stroke="#a0a6ae" stroke-width="2.5"
        stroke-linecap="round"/>
  <path d="M 324,210 Q 346,196 364,194"
        fill="none" stroke="#a0a6ae" stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Lens highlights — only top edge (the inverted-blue gradient is darkest on top) -->
  <path d="M 100,196 Q 130,188 160,194"
        fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round" opacity="0.50"/>
  <path d="M 240,194 Q 270,188 300,196"
        fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round" opacity="0.50"/>

  <!-- Dad smirk -->
  <path d="M 162,288 Q 200,310 244,278"
        fill="none" stroke="#6a2818" stroke-width="6"
        stroke-linecap="round" opacity="0.80"/>
</svg>