<svg xmlns="http://www.w3.org/2000/svg" viewBox="52.00 51.00 220.00 41.00" role="img" aria-hidden="true">
<defs>
    <radialGradient id="bg-glow" cx="55%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#182030"></stop>
      <stop offset="100%" stop-color="#0b0f15"></stop>
    </radialGradient>
    <radialGradient id="body-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"></stop>
      <stop offset="50%" stop-color="#5282a8"></stop>
      <stop offset="100%" stop-color="#3e6c92"></stop>
    </radialGradient>
    <radialGradient id="spec-g" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="moon-g" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"></stop>
      <stop offset="50%" stop-color="#669cc0"></stop>
      <stop offset="100%" stop-color="#5086aa"></stop>
    </radialGradient>
    <radialGradient id="moon-spec-g" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"></stop>
      <stop offset="100%" stop-color="white" stop-opacity="0"></stop>
    </radialGradient>
    <!-- Crack pattern for "broken claw" -->
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
  </defs>
<g opacity="0.3">
    <text x="60" y="75" style="font-family: 'SF Mono', 'Fira Code', monospace; font-size: 21px; fill: #6e7681; letter-spacing: 5px; font-weight: 600;">CLAW CODE</text>
    <!-- Strike-through -->
    <line x1="56" y1="69" x2="268" y2="69" stroke="#6e7681" stroke-width="2"></line>
    <!-- Crack lines through the text -->
    <path d="M120,58 L125,72 L118,82" fill="none" stroke="#f0883e" stroke-width="1.5" opacity="0.6"></path>
    <path d="M190,55 L195,70 L188,80 L192,88" fill="none" stroke="#f0883e" stroke-width="1.2" opacity="0.5"></path>
    <path d="M155,60 L152,75" fill="none" stroke="#f0883e" stroke-width="1" opacity="0.4"></path>
  </g>
</svg>
