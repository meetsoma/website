<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0e1620"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="body-faint" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#3a5570" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a3e54" stop-opacity="0.35"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e" opacity="0.85"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6494be" opacity="0.85"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="640" height="470" fill="url(#bg-g)" rx="12"/>

  <!-- ══════════════════════════════════════════════════════════════
       MASCOT: Scholar with glasses, organizing body files
       ══════════════════════════════════════════════════════════════ -->

  <!-- Body -->
  <circle cx="300" cy="260" r="125" fill="url(#body-faint)" stroke="#6494be" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.85"/>

  <!-- Specular highlight -->
  <ellipse cx="270" cy="215" rx="40" ry="25" fill="white" opacity="0.06"/>

  <!-- Eyes — focused, peering through glasses -->
  <circle cx="265" cy="250" r="5" fill="#c9d1d9"/>
  <circle cx="335" cy="248" r="5" fill="#c9d1d9"/>

  <!-- Focused brows -->
  <line x1="238" y1="228" x2="285" y2="236" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="362" y1="226" x2="315" y2="234" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Reading glasses -->
  <path d="M225 250 Q225 282 260 282 Q295 282 295 252" fill="rgba(255,255,255,0.04)" stroke="#6494be" stroke-width="2"/>
  <path d="M305 252 Q305 280 340 280 Q375 280 375 250" fill="rgba(255,255,255,0.04)" stroke="#6494be" stroke-width="2"/>
  <line x1="295" y1="255" x2="305" y2="255" stroke="#6494be" stroke-width="2"/>
  <line x1="225" y1="252" x2="195" y2="248" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>
  <line x1="375" y1="250" x2="405" y2="246" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>

  <!-- Small satisfied smile — organized! -->
  <path d="M280,310 Q300,325 320,310" fill="none" stroke="#c9d1d9" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Arms — reaching toward file cards -->
  <!-- Left arm reaching to body.md card -->
  <path d="M190 300 Q160 320 130 350" fill="none" stroke="#6494be" stroke-width="2" stroke-dasharray="2 3" opacity="0.6"/>
  <!-- Right arm reaching to core_rules card -->
  <path d="M410 295 Q440 310 470 335" fill="none" stroke="#6494be" stroke-width="2" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════════════════════
       BODY FILE CARDS — scattered around, connected by arrows
       ══════════════════════════════════════════════════════════════ -->

  <!-- body.md — bottom left -->
  <rect x="55" y="340" width="110" height="70" rx="8" fill="rgba(22,27,34,0.7)" stroke="#6494be" stroke-width="1.5"/>
  <text x="110" y="365" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" fill="#c9d1d9" font-weight="600">body.md</text>
  <text x="110" y="385" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">routing table</text>
  <text x="110" y="400" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6494be">↓ 517→2,821B</text>

  <!-- core_rules.md — bottom right -->
  <rect x="475" y="325" width="120" height="70" rx="8" fill="rgba(22,27,34,0.7)" stroke="#6494be" stroke-width="1.5"/>
  <text x="535" y="350" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#8bb9e0" font-weight="600">core_rules.md</text>
  <text x="535" y="370" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">behavioral defaults</text>
  <text x="535" y="388" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6494be">★ NEW</text>

  <!-- _memory.md — top left, with evolution arrow -->
  <rect x="30" y="185" width="120" height="70" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="210" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#c9d1d9" font-weight="600">_memory.md</text>
  <text x="90" y="230" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">preload template</text>
  <text x="90" y="248" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f0883e">6,723→4,597B −32%</text>

  <!-- soul.md — top right, smaller -->
  <rect x="460" y="175" width="105" height="60" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="512" y="200" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#c9d1d9" font-weight="600">soul.md</text>
  <text x="512" y="218" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">identity</text>
  <text x="512" y="232" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#6494be">How I Learn/Build</text>

  <!-- voice.md — right edge middle -->
  <rect x="530" y="260" width="95" height="55" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="577" y="282" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#c9d1d9" font-weight="600">voice.md</text>
  <text x="577" y="300" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">density + corrections</text>

  <!-- STATE.md — small card near bottom -->
  <rect x="175" y="405" width="95" height="45" rx="6" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="222" y="425" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#c9d1d9" font-weight="600">STATE.md</text>
  <text x="222" y="442" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">branches table</text>

  <!-- ══════════════════════════════════════════════════════════════
       ANNOTATION ARROWS — connecting files to the mascot
       ══════════════════════════════════════════════════════════════ -->

  <!-- Arrow: _memory.md → mascot (head/thinking) -->
  <line x1="150" y1="210" x2="210" y2="240" stroke="#f0883e" stroke-width="1.2" opacity="0.7"/>
  <text x="48" y="170" font-family="'SF Mono', monospace" font-size="11" fill="#f0883e" font-weight="600">leaner preload</text>

  <!-- Arrow: soul.md → mascot (self) -->
  <line x1="480" y1="210" x2="420" y2="240" stroke="#6e7681" stroke-width="1" opacity="0.5"/>

  <!-- Arrow: body.md card → mascot hand -->
  <line x1="150" y1="352" x2="190" y2="310" stroke="#f0883e" stroke-width="1.2" opacity="0.7"/>

  <!-- Arrow: core_rules → mascot hand -->
  <line x1="480" y1="345" x2="425" y2="305" stroke="#6494be" stroke-width="1.2" opacity="0.8"/>

  <!-- ══════════════════════════════════════════════════════════════
       EVOLUTION ARC — version timeline at the bottom
       ══════════════════════════════════════════════════════════════ -->

  <line x1="340" y1="395" x2="450" y2="395" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <text x="340" y="388" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">v0.22</text>
  <text x="450" y="388" font-family="'SF Mono', monospace" font-size="9" fill="#8bb9e0">v0.29</text>
  <text x="395" y="408" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#6494be">6 files improved</text>

  <!-- ══════════════════════════════════════════════════════════════
       TITLE
       ══════════════════════════════════════════════════════════════ -->

  <text x="320" y="45" text-anchor="middle" font-family="'SF Mono', monospace" font-size="16" fill="#c9d1d9" font-weight="600" letter-spacing="1">THE BODY EVOLVED</text>
  <text x="320" y="65" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#6e7681">From 6 monolithic files to 12, with routing tables and behavioral defaults</text>

  <!-- Phase number badge -->
  <rect x="280" y="20" width="80" height="20" rx="10" fill="rgba(100,148,190,0.1)" stroke="#6494be" stroke-width="1"/>
  <text x="320" y="34" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6494be" letter-spacing="1">v0.29.0</text>
</svg>
