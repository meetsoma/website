<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0e1620"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="body-faint" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#3a5570" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2a3e54" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="470" fill="url(#bg-g)" rx="12"/>

  <!-- ══════════════════════════════════════════════════════════════
       MASCOT: Curious scholar (v2) — thoughtful, not angry.
       Asymmetric eyebrows: right raised (questioning), left relaxed.
       Small round pupils with highlights. Half-moon glasses.
       Slight quirked mouth. Tiny "?" thought mark.
       ══════════════════════════════════════════════════════════════ -->

  <!-- Body -->
  <circle cx="300" cy="250" r="125" fill="url(#body-faint)" stroke="#6494be" stroke-width="1.5" stroke-dasharray="3 4" opacity="0.85"/>

  <!-- Specular highlight -->
  <ellipse cx="270" cy="200" rx="40" ry="25" fill="white" opacity="0.06"/>

  <!-- Eyebrows — gently arched, symmetric (thoughtful, not crooked) -->
  <path d="M 234 166 Q 260 158 286 166" fill="none" stroke="#c9d1d9" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M 314 166 Q 340 158 366 166" fill="none" stroke="#c9d1d9" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>

  <!-- Eyes — round pupils with highlights, sitting just above the reading glasses -->
  <circle cx="260" cy="196" r="5.5" fill="#c9d1d9"/>
  <circle cx="261.5" cy="194" r="1.6" fill="white" opacity="0.75"/>
  <circle cx="340" cy="196" r="5.5" fill="#c9d1d9"/>
  <circle cx="341.5" cy="194" r="1.6" fill="white" opacity="0.75"/>

  <!-- Half-moon reading glasses — symmetric, worn low, one lens under each eye -->
  <path d="M 222 214 Q 222 244 260 244 Q 298 244 298 214" fill="rgba(255,255,255,0.04)" stroke="#6494be" stroke-width="2"/>
  <path d="M 302 214 Q 302 244 340 244 Q 378 244 378 214" fill="rgba(255,255,255,0.04)" stroke="#6494be" stroke-width="2"/>
  <line x1="298" y1="214" x2="302" y2="214" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="214" x2="192" y2="210" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>
  <line x1="378" y1="214" x2="408" y2="210" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>

  <!-- Mouth — gentle, even ("hmm, makes sense") -->
  <path d="M 280 280 Q 300 289 320 280" fill="none" stroke="#c9d1d9" stroke-width="3.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Tiny "?" thought mark — the curious scholar -->
  <g transform="translate(395, 105)" opacity="0.5">
    <path d="M 0 0 Q 5 -5 10 -2 Q 14 2 8 8" fill="none" stroke="#6494be" stroke-width="2" stroke-linecap="round"/>
    <circle cx="6" cy="14" r="1.5" fill="#6494be"/>
  </g>

  <!-- Arms — reaching toward body file cards -->
  <path d="M 185 290 Q 155 310 125 340" fill="none" stroke="#6494be" stroke-width="2" stroke-dasharray="2 3" opacity="0.5"/>
  <path d="M 415 285 Q 445 300 475 325" fill="none" stroke="#6494be" stroke-width="2" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- ══════════════════════════════════════════════════════════════
       BODY FILE CARDS
       ══════════════════════════════════════════════════════════════ -->

  <!-- _memory.md — top left -->
  <rect x="28" y="175" width="120" height="70" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="88" y="200" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#c9d1d9" font-weight="600">_memory.md</text>
  <text x="88" y="220" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">preload template</text>
  <text x="88" y="238" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f0883e">6,723→4,597B −32%</text>

  <!-- body.md — bottom left -->
  <rect x="55" y="330" width="110" height="70" rx="8" fill="rgba(22,27,34,0.7)" stroke="#6494be" stroke-width="1.5"/>
  <text x="110" y="355" text-anchor="middle" font-family="'SF Mono', monospace" font-size="14" fill="#c9d1d9" font-weight="600">body.md</text>
  <text x="110" y="375" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">routing table</text>
  <text x="110" y="390" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6494be">↓ 517→2,821B</text>

  <!-- core_rules.md — bottom right (highlighted) -->
  <rect x="475" y="315" width="120" height="70" rx="8" fill="rgba(100,148,190,0.06)" stroke="#6494be" stroke-width="1.5"/>
  <text x="535" y="340" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#8bb9e0" font-weight="600">core_rules.md</text>
  <text x="535" y="360" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">behavioral defaults</text>
  <text x="535" y="378" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6494be">★ NEW in v0.29</text>

  <!-- soul.md — top right -->
  <rect x="460" y="168" width="105" height="55" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="512" y="190" text-anchor="middle" font-family="'SF Mono', monospace" font-size="13" fill="#c9d1d9" font-weight="600">soul.md</text>
  <text x="512" y="208" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">How I Learn / Build</text>

  <!-- voice.md — right edge -->
  <rect x="530" y="252" width="95" height="48" rx="8" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="577" y="273" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#c9d1d9" font-weight="600">voice.md</text>
  <text x="577" y="290" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">density + fix</text>

  <!-- STATE.md — bottom small -->
  <rect x="175" y="395" width="95" height="45" rx="6" fill="rgba(22,27,34,0.7)" stroke="#30363d" stroke-width="1"/>
  <text x="222" y="415" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" fill="#c9d1d9" font-weight="600">STATE.md</text>
  <text x="222" y="432" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">branches table</text>

  <!-- ══════════════════════════════════════════════════════════════
       EVOLUTION ARC
       ══════════════════════════════════════════════════════════════ -->

  <line x1="340" y1="385" x2="450" y2="385" stroke="#6494be" stroke-width="1" opacity="0.4"/>
  <text x="340" y="378" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">v0.22</text>
  <text x="450" y="378" font-family="'SF Mono', monospace" font-size="9" fill="#8bb9e0">v0.29</text>
  <text x="395" y="398" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" fill="#6494be">6 files improved</text>

  <!-- No embedded title/version — the roadmap card chrome supplies those.
       (The version-number layout belongs in the standalone blog OG, not here.) -->
</svg>
