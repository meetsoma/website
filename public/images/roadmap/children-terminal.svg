<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.00 0.00 1048.00 428.00" role="img" aria-hidden="true">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"></stop>
      <stop offset="1" stop-color="#161b22"></stop>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2128"></stop>
      <stop offset="1" stop-color="#161b22"></stop>
    </linearGradient>
  </defs>
<g>
    <rect x="0" y="0" width="1040" height="420" rx="12" fill="url(#terminal)" stroke="#30363d" stroke-width="1"></rect>

    <!-- chrome -->
    <circle cx="28" cy="28" r="7" fill="#ff5f56"></circle>
    <circle cx="52" cy="28" r="7" fill="#ffbd2e"></circle>
    <circle cx="76" cy="28" r="7" fill="#27c93f"></circle>
    <text x="520" y="34" text-anchor="middle" fill="#6e7681" font-size="14" font-family="ui-monospace, Menlo, monospace">σ  soma</text>

    <line x1="0" y1="56" x2="1040" y2="56" stroke="#30363d"></line>

    <!-- Command lines -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">
      <text x="30" y="110" fill="#6e7681">$</text>
      <text x="54" y="110" fill="#c9d1d9">npm install -g </text>
      <text x="248" y="110" fill="#d2a8ff">meetsoma@latest</text>
      <text x="448" y="110" fill="#6e7681"> &amp;&amp; </text>
      <text x="498" y="110" fill="#7ee787">soma</text>
      <text x="554" y="110" fill="#c9d1d9">update</text>

      <text x="30" y="180" fill="#6e7681">$</text>
      <text x="54" y="180" fill="#7ee787">soma</text>
      <text x="112" y="180" fill="#c9d1d9">doctor</text>

      <text x="30" y="250" fill="#6e7681">$</text>
      <text x="54" y="250" fill="#7ee787">soma</text>
      <text x="112" y="250" fill="#c9d1d9">model-sync</text>
      <text x="260" y="250" fill="#79c0ff">--set</text>
      <text x="328" y="250" fill="#d2a8ff">claude-opus-4-7</text>
