<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="42%" r="80%">
      <stop offset="0%" stop-color="#0e1620"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="fable-glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2a3e54" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8bb9e0" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="640" height="470" fill="url(#bg-g)" rx="12"/>
  <rect width="640" height="470" fill="url(#fable-glow)" rx="12"/>

  <!-- ══════════════════════════════════════════════════════════════
       Frontier ridge — Mythos-class, #1 on FrontierBench.
       A rising summit behind the content (faded).
       ══════════════════════════════════════════════════════════════ -->
  <path d="M 30 372 L 150 318 L 240 344 L 330 232 L 432 300 L 530 256 L 610 286 L 610 412 L 30 412 Z"
        fill="url(#ridge)"/>
  <path d="M 30 372 L 150 318 L 240 344 L 330 232 L 432 300 L 530 256 L 610 286"
        fill="none" stroke="#8bb9e0" stroke-width="1.5" opacity="0.5"/>
  <circle cx="330" cy="232" r="4" fill="#f0883e" opacity="0.9"/>
  <text x="330" y="220" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#f0883e" opacity="0.8">FrontierBench #1</text>

  <!-- ══════════════════════════════════════════════════════════════
       The cost story: $0.00 (flying blind) → real cost (honest).
       The whole point of the release, in one transition.
       ══════════════════════════════════════════════════════════════ -->
  <g opacity="0.6">
    <text x="148" y="150" text-anchor="middle" font-family="'SF Mono', monospace" font-size="33" fill="#6e7681" font-weight="700">$0.00</text>
    <line x1="100" y1="142" x2="196" y2="142" stroke="#8b4a3a" stroke-width="2.5" stroke-linecap="round"/>
    <text x="148" y="172" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#6e7681">flying blind</text>
  </g>

  <path d="M 232 138 L 286 138" stroke="#6494be" stroke-width="1.5" opacity="0.6"/>
  <path d="M 280 133 L 288 138 L 280 143" fill="none" stroke="#6494be" stroke-width="1.5" opacity="0.6"/>

  <g>
    <text x="398" y="150" text-anchor="middle" font-family="'SF Mono', monospace" font-size="33" fill="#f0883e" font-weight="700" opacity="0.92">$10 / $50</text>
    <text x="398" y="172" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#c9d1d9" opacity="0.7">per M in/out — tracked honestly</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════
       Model nameplate
       ══════════════════════════════════════════════════════════════ -->
  <rect x="218" y="246" width="204" height="48" rx="10" fill="rgba(100,148,190,0.06)" stroke="#6494be" stroke-width="1.5"/>
  <text x="320" y="269" text-anchor="middle" font-family="'SF Mono', monospace" font-size="15" fill="#8bb9e0" font-weight="600">claude-fable-5</text>
  <text x="320" y="285" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" fill="#6e7681">Mythos-class · soma --model fable</text>

  <!-- ══════════════════════════════════════════════════════════════
       Capability chips
       ══════════════════════════════════════════════════════════════ -->
  <g font-family="'SF Mono', monospace" font-size="10">
    <rect x="148" y="334" width="92" height="26" rx="13" fill="rgba(22,27,34,0.7)" stroke="#30363d"/>
    <text x="194" y="351" text-anchor="middle" fill="#c9d1d9">1M context</text>
    <rect x="252" y="334" width="64" height="26" rx="13" fill="rgba(22,27,34,0.7)" stroke="#30363d"/>
    <text x="284" y="351" text-anchor="middle" fill="#c9d1d9">vision</text>
    <rect x="328" y="334" width="118" height="26" rx="13" fill="rgba(22,27,34,0.7)" stroke="#30363d"/>
    <text x="387" y="351" text-anchor="middle" fill="#c9d1d9">xhigh thinking</text>
  </g>

  <!-- σ watermark -->
  <text x="606" y="448" text-anchor="end" font-family="Georgia, serif" font-size="22" fill="#6494be" opacity="0.25">σ</text>

  <!-- No embedded title/version — the roadmap card chrome supplies those. -->
</svg>
