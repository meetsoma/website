<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="bg-g" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0e1620" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0.98"/>
    </radialGradient>
    <linearGradient id="scan-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6494be" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6494be" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6494be" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="640" height="480" fill="url(#bg-g)"/>

  <!-- Browser window frame -->
  <rect x="80" y="50" width="480" height="380" rx="8" fill="#111827" stroke="#2a3e54" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="80" y="50" width="480" height="32" rx="8" fill="#1a2332"/>
  <rect x="80" y="70" width="480" height="12" fill="#1a2332"/>
  <!-- Traffic lights -->
  <circle cx="100" cy="66" r="5" fill="#f0883e" opacity="0.6"/>
  <circle cx="116" cy="66" r="5" fill="#e5c07b" opacity="0.4"/>
  <circle cx="132" cy="66" r="5" fill="#4ade80" opacity="0.4"/>
  <!-- URL bar -->
  <rect x="160" y="60" width="360" height="14" rx="6" fill="#0e1620" stroke="#2a3e54" stroke-width="0.8"/>
  <text x="176" y="71" fill="#6494be" font-size="8" font-family="SF Mono, monospace" opacity="0.7">🌐 soma:browser.navigate</text>

  <!-- DOM tree (left side) — xray view -->
  <g opacity="0.7">
    <!-- Tree lines -->
    <line x1="110" y1="115" x2="110" y2="400" stroke="#6494be" stroke-width="0.8" stroke-dasharray="2 3"/>
    <line x1="110" y1="130" x2="140" y2="130" stroke="#6494be" stroke-width="0.6"/>
    <line x1="140" y1="130" x2="140" y2="170" stroke="#6494be" stroke-width="0.6" stroke-dasharray="1 2"/>
    <line x1="140" y1="150" x2="168" y2="150" stroke="#4ade80" stroke-width="0.6"/>
    <line x1="110" y1="175" x2="168" y2="175" stroke="#6494be" stroke-width="0.6"/>
    <line x1="110" y1="210" x2="140" y2="210" stroke="#6494be" stroke-width="0.6"/>
    <line x1="140" y1="210" x2="140" y2="250" stroke="#6494be" stroke-width="0.6" stroke-dasharray="1 2"/>
    <line x1="140" y1="230" x2="168" y2="230" stroke="#f0883e" stroke-width="0.6"/>

    <!-- Node labels -->
    <text x="114" y="125" fill="#6494be" font-size="7" font-family="SF Mono, monospace">html</text>
    <text x="144" y="125" fill="#6494be" font-size="7" font-family="SF Mono, monospace">body</text>
    <text x="144" y="145" fill="#4ade80" font-size="7" font-family="SF Mono, monospace">header</text>
    <text x="114" y="170" fill="#6494be" font-size="7" font-family="SF Mono, monospace">main</text>
    <text x="144" y="205" fill="#6494be" font-size="7" font-family="SF Mono, monospace">form</text>
    <text x="144" y="225" fill="#f0883e" font-size="7" font-family="SF Mono, monospace">input</text>
    <text x="114" y="260" fill="#c9d1d9" font-size="7" font-family="SF Mono, monospace" opacity="0.5">…</text>
  </g>

  <!-- Page content (right side) — rendered view -->
  <g>
    <!-- Card 1 -->
    <rect x="200" y="100" width="330" height="55" rx="4" fill="#1a2332" stroke="#2a3e54" stroke-width="0.8"/>
    <rect x="210" y="110" width="80" height="10" rx="2" fill="#6494be" opacity="0.15"/>
    <text x="215" y="119" fill="#c9d1d9" font-size="8" font-family="SF Mono, monospace">Dashboard</text>
    <text x="300" y="119" fill="#6494be" font-size="7" font-family="SF Mono, monospace" opacity="0.5">/admin</text>
    <rect x="210" y="126" width="300" height="4" rx="1" fill="#2a3e54" opacity="0.5"/>
    <rect x="210" y="133" width="200" height="4" rx="1" fill="#2a3e54" opacity="0.4"/>
    <rect x="210" y="140" width="160" height="4" rx="1" fill="#2a3e54" opacity="0.3"/>

    <!-- Card 2 — with hover highlight -->
    <rect x="200" y="165" width="330" height="55" rx="4" fill="#1a2f40" stroke="#4ade80" stroke-width="1.2"/>
    <rect x="210" y="175" width="70" height="10" rx="2" fill="#4ade80" opacity="0.2"/>
    <text x="215" y="184" fill="#4ade80" font-size="8" font-family="SF Mono, monospace">Settings</text>
    <text x="285" y="184" fill="#6494be" font-size="7" font-family="SF Mono, monospace" opacity="0.5">/settings</text>
    <rect x="210" y="191" width="280" height="4" rx="1" fill="#2a3e54" opacity="0.5"/>
    <rect x="210" y="198" width="240" height="4" rx="1" fill="#2a3e54" opacity="0.4"/>

    <!-- Card 3 -->
    <rect x="200" y="230" width="330" height="55" rx="4" fill="#1a2332" stroke="#2a3e54" stroke-width="0.8"/>
    <rect x="210" y="240" width="60" height="10" rx="2" fill="#6494be" opacity="0.15"/>
    <text x="215" y="249" fill="#c9d1d9" font-size="8" font-family="SF Mono, monospace">Profile</text>

    <!-- Card 4 — with fill target -->
    <rect x="200" y="295" width="330" height="55" rx="4" fill="#1a2332" stroke="#f0883e" stroke-width="1.5"/>
    <rect x="210" y="305" width="50" height="10" rx="2" fill="#f0883e" opacity="0.15"/>
    <text x="215" y="314" fill="#f0883e" font-size="8" font-family="SF Mono, monospace">Name:</text>
    <rect x="260" y="306" width="180" height="16" rx="3" fill="#0e1620" stroke="#f0883e" stroke-width="1"/>
    <text x="268" y="318" fill="#c9d1d9" font-size="9" font-family="SF Mono, monospace" opacity="0.8">Curtis</text>
    <!-- Blinking cursor in input -->
    <rect x="312" y="309" width="1" height="10" fill="#f0883e" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Mouse cursor (floating over the Settings card) -->
  <g transform="translate(530, 192)">
    <path d="M0,0 L0,18 L4,14 L8,20 L11,19 L7,13 L12,12 Z" fill="#c9d1d9" opacity="0.9"/>
    <!-- Click ripple -->
    <circle cx="6" cy="10" r="6" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="4;14" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Capabilities floating labels -->
  <g font-family="SF Mono, monospace" font-size="9">
    <!-- xray -->
    <rect x="88" y="355" width="72" height="18" rx="3" fill="#6494be" opacity="0.15" stroke="#6494be" stroke-width="0.6"/>
    <text x="98" y="368" fill="#6494be" font-size="8">🔍 xray</text>

    <!-- click -->
    <rect x="168" y="355" width="78" height="18" rx="3" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="0.6"/>
    <text x="178" y="368" fill="#4ade80" font-size="8">🖱️ click</text>

    <!-- fill -->
    <rect x="254" y="355" width="62" height="18" rx="3" fill="#f0883e" opacity="0.15" stroke="#f0883e" stroke-width="0.6"/>
    <text x="264" y="368" fill="#f0883e" font-size="8">✏️ fill</text>

    <!-- wait -->
    <rect x="324" y="355" width="72" height="18" rx="3" fill="#e5c07b" opacity="0.15" stroke="#e5c07b" stroke-width="0.6"/>
    <text x="334" y="368" fill="#e5c07b" font-size="8">⏳ wait</text>
  </g>

  <!-- Bridge indicator -->
  <rect x="440" y="355" width="110" height="18" rx="3" fill="#2a3e54" opacity="0.5" stroke="#6494be" stroke-width="0.6"/>
  <text x="452" y="368" fill="#6494be" font-size="7" font-family="SF Mono, monospace" opacity="0.7">🌉 via bridge CDP</text>

  <!-- Scan line effect -->
  <rect x="82" y="82" width="476" height="346" fill="url(#scan-line)" opacity="0.15"/>

  <!-- Brand watermark -->
  <text x="620" y="470" fill="#2a3e54" font-size="10" font-family="Georgia, serif" text-anchor="end" opacity="0.4">SOMA</text>
</svg>
