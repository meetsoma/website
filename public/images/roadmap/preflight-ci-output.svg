<svg xmlns="http://www.w3.org/2000/svg" viewBox="0.00 0.00 488.00 408.00" role="img" aria-hidden="true">
<defs>
    <radialGradient id="bg-g" cx="40%" cy="45%" r="85%">
      <stop offset="0%" stop-color="#15172a"></stop>
      <stop offset="100%" stop-color="#070810"></stop>
    </radialGradient>
    <linearGradient id="row-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(40,200,64,0.12)"></stop>
      <stop offset="100%" stop-color="rgba(40,200,64,0)"></stop>
    </linearGradient>
  </defs>
<g>
    <!-- Terminal window chrome -->
    <rect x="0" y="0" width="480" height="400" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"></rect>
    <circle cx="18" cy="18" r="5" fill="#ff5f56"></circle>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"></circle>
    <circle cx="54" cy="18" r="5" fill="#27c93f"></circle>
    <text x="240" y="22" text-anchor="middle" font-family="'SF Mono', monospace" font-size="10" fill="#8b949e" letter-spacing="1">CI · test-suite</text>

    <!-- Green-check header (looks like everything passed) -->
    <g transform="translate(20, 54)">
      <text x="0" y="0" font-family="'SF Mono', monospace" font-size="13" fill="#28c840" font-weight="600">✓ ALL SUITES PASSING</text>
      <text x="240" y="0" font-family="'SF Mono', monospace" font-size="11" fill="#6e7681" opacity="0.8">5 of 5  •  0 failures</text>
    </g>

    <!-- Row per suite -->
    <g font-family="'SF Mono', monospace" font-size="12.5">
      <!-- row 1 -->
      <g transform="translate(20, 100)">
        <rect x="-10" y="-16" width="470" height="34" fill="url(#row-fade)"></rect>
        <text x="0" y="0" fill="#28c840" font-weight="600">✓</text>
        <text x="24" y="0" fill="#c9d1d9">test-maps.sh</text>
        <text x="260" y="0" fill="#6e7681">0 assertions</text>
        <text x="370" y="0" fill="#f85149" opacity="0.85" font-size="10.5" letter-spacing="1.5">BAILED</text>
      </g>
      <!-- row 2 -->
      <g transform="translate(20, 140)">
        <rect x="-10" y="-16" width="470" height="34" fill="url(#row-fade)"></rect>
        <text x="0" y="0" fill="#28c840" font-weight="600">✓</text>
        <text x="24" y="0" fill="#c9d1d9">test-skill-loader.sh</text>
        <text x="260" y="0" fill="#6e7681">0 assertions</text>
        <text x="370" y="0" fill="#f85149" opacity="0.85" font-size="10.5" letter-spacing="1.5">BAILED</text>
      </g>
      <!-- row 3 -->
      <g transform="translate(20, 180)">
        <rect x="-10" y="-16" width="470" height="34" fill="url(#row-fade)"></rect>
        <text x="0" y="0" fill="#28c840" font-weight="600">✓</text>
        <text x="24" y="0" fill="#c9d1d9">test-doctor.sh</text>
        <text x="260" y="0" fill="#6e7681">3 skipped</text>
        <text x="370" y="0" fill="#f85149" opacity="0.85" font-size="10.5" letter-spacing="1.5">BAILED</text>
      </g>
      <!-- row 4 -->
      <g transform="translate(20, 220)">
        <rect x="-10" y="-16" width="470" height="34" fill="url(#row-fade)"></rect>
        <text x="0" y="0" fill="#28c840" font-weight="600">✓</text>
        <text x="24" y="0" fill="#c9d1d9">test-somaverse.sh</text>
        <text x="260" y="0" fill="#6e7681">4 skipped</text>
        <text x="370" y="0" fill="#f85149" opacity="0.85" font-size="10.5" letter-spacing="1.5">BAILED</text>
      </g>
      <!-- row 5 -->
      <g transform="translate(20, 260)">
        <rect x="-10" y="-16" width="470" height="34" fill="url(#row-fade)"></rect>
        <text x="0" y="0" fill="#28c840" font-weight="600">✓</text>
        <text x="24" y="0" fill="#c9d1d9">test-install-flows.sh</text>
        <text x="260" y="0" fill="#6e7681">0 assertions</text>
        <text x="370" y="0" fill="#f85149" opacity="0.85" font-size="10.5" letter-spacing="1.5">BAILED</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="20" y1="310" x2="460" y2="310" stroke="#30363d" stroke-width="1" opacity="0.6"></line>

    <!-- Caption inside terminal -->
    <text x="240" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c9d1d9" font-style="italic" opacity="0.9">Every check exited before the</text>
    <text x="240" y="366" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#c9d1d9" font-style="italic" opacity="0.9">first assertion. CI stayed green.</text>
  </g>
</svg>
