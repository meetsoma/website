<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="hcs-bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0e1620"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="hcs-glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2a3e54" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hcs-parent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2738"/>
      <stop offset="100%" stop-color="#101a26"/>
    </linearGradient>
    <linearGradient id="hcs-sub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14202e"/>
      <stop offset="100%" stop-color="#0c141d"/>
    </linearGradient>
  </defs>

  <rect width="640" height="470" fill="url(#hcs-bg)"/>
  <rect width="640" height="470" fill="url(#hcs-glow)"/>

  <!-- branch lines: parent → 3 children; the middle (claude-cli) is the live subscription path -->
  <g fill="none" stroke-width="2">
    <path d="M320 168 C 200 220, 150 250, 150 300" stroke="#33455c" stroke-opacity="0.7"/>
    <path d="M320 168 C 490 220, 490 250, 490 300" stroke="#33455c" stroke-opacity="0.7"/>
    <path d="M320 168 C 320 230, 320 250, 320 300" stroke="#4ade80" stroke-opacity="0.85"/>
  </g>

  <!-- parent node: soma -->
  <g>
    <rect x="232" y="112" width="176" height="56" rx="12" fill="url(#hcs-parent)" stroke="#3a5170" stroke-width="1.5"/>
    <circle cx="262" cy="140" r="8" fill="#4ade80"/>
    <text x="284" y="146" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#cfe3f5" font-weight="600">soma</text>
    <text x="284" y="146" font-family="ui-monospace, Menlo, monospace" font-size="20" fill="#cfe3f5" font-weight="600" dx="56" opacity="0.5">·delegate</text>
  </g>

  <!-- child sub-agents -->
  <!-- left: opencode (free) -->
  <g>
    <rect x="78" y="300" width="144" height="92" rx="11" fill="url(#hcs-sub)" stroke="#2c3e54" stroke-width="1.4"/>
    <text x="98" y="332" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#8fb0cc">child</text>
    <text x="98" y="356" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#cfe3f5" font-weight="600">opencode</text>
    <text x="98" y="378" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#5f7d99">free · headless</text>
  </g>

  <!-- center: claude-cli (subscription) -->
  <g>
    <rect x="244" y="300" width="152" height="100" rx="12" fill="url(#hcs-sub)" stroke="#4ade80" stroke-width="1.8"/>
    <text x="266" y="332" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#9fd9b4">child</text>
    <text x="266" y="356" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#eafff1" font-weight="700">claude-cli</text>
    <text x="266" y="378" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#4ade80">subscription ✓</text>
    <text x="266" y="394" font-family="ui-monospace, Menlo, monospace" font-size="11.5" fill="#5f7d99">not extra usage</text>
  </g>

  <!-- right: claude-cli/opus -->
  <g>
    <rect x="418" y="300" width="144" height="92" rx="11" fill="url(#hcs-sub)" stroke="#2c3e54" stroke-width="1.4"/>
    <text x="438" y="332" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#8fb0cc">child</text>
    <text x="438" y="356" font-family="ui-monospace, Menlo, monospace" font-size="15" fill="#cfe3f5" font-weight="600">sonnet</text>
    <text x="438" y="378" font-family="ui-monospace, Menlo, monospace" font-size="12.5" fill="#5f7d99">read-only</text>
  </g>

  <!-- caption -->
  <text x="320" y="442" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#7d99b4">headless sub-agents — first-party, on your plan</text>
</svg>
