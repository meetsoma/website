<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient — subtle radial glow behind mascot -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1e2a42"/>
      <stop offset="100%" stop-color="#0e1420"/>
    </radialGradient>
    
    <!-- Mascot gradients -->
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>
    <radialGradient id="gshd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Soft aura behind mascot -->
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6898be" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#6898be" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#6898be" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-glow)"/>
  
  <!-- Scattered stars -->
  <circle cx="120" cy="80" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="340" cy="140" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="80" cy="300" r="1" fill="white" opacity="0.25"/>
  <circle cx="200" cy="480" r="0.9" fill="white" opacity="0.35"/>
  <circle cx="450" cy="60" r="1.1" fill="white" opacity="0.3"/>
  <circle cx="500" cy="520" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="780" cy="40" r="1" fill="white" opacity="0.35"/>
  <circle cx="900" cy="100" r="0.7" fill="white" opacity="0.25"/>
  <circle cx="1050" cy="70" r="1.2" fill="white" opacity="0.3"/>
  <circle cx="1180" cy="200" r="0.9" fill="white" opacity="0.4"/>
  <circle cx="1100" cy="400" r="1" fill="white" opacity="0.2"/>
  <circle cx="1220" cy="520" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="160" cy="190" r="0.7" fill="white" opacity="0.2"/>
  <circle cx="1000" cy="550" r="1.1" fill="white" opacity="0.25"/>
  <circle cx="700" cy="590" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="380" cy="380" r="0.6" fill="white" opacity="0.2"/>
  <circle cx="950" cy="300" r="0.9" fill="white" opacity="0.15"/>
  <circle cx="60" cy="550" r="1" fill="white" opacity="0.25"/>

  <!-- Aura glow behind mascot -->
  <ellipse cx="640" cy="230" rx="220" ry="200" fill="url(#aura)"/>

  <!-- Mascot — scaled up -->
  <g transform="translate(640, 210) scale(0.7)">
    <g transform="translate(-256, -280)">
      <!-- Ground shadow -->
      <ellipse cx="264" cy="480" rx="118" ry="12" fill="url(#gshd)"/>
      <!-- Legs -->
      <rect x="214" y="414" width="24" height="36" rx="12" fill="url(#leg)"/>
      <rect x="276" y="414" width="24" height="36" rx="12" fill="url(#leg)"/>
      <ellipse cx="226" cy="452" rx="18" ry="10" fill="#3c6e8e"/>
      <ellipse cx="288" cy="452" rx="18" ry="10" fill="#3c6e8e"/>
      <!-- Arms -->
      <circle cx="106" cy="284" r="34" fill="url(#arm)"/>
      <circle cx="406" cy="284" r="34" fill="url(#arm)"/>
      <!-- Planet body -->
      <circle cx="256" cy="280" r="148" fill="url(#body)"/>
      <circle cx="256" cy="280" r="148" fill="url(#spec)"/>
      <!-- Moon shadow on planet -->
      <ellipse cx="348" cy="186" rx="32" ry="28" fill="url(#moon-shd)" transform="rotate(15 348 186)"/>
      <!-- Eyes -->
      <circle cx="218" cy="262" r="28" fill="white"/>
      <circle cx="224" cy="258" r="14" fill="#12202e"/>
      <circle cx="230" cy="252" r="6" fill="white"/>
      <circle cx="294" cy="260" r="28" fill="white"/>
      <circle cx="300" cy="256" r="14" fill="#12202e"/>
      <circle cx="306" cy="250" r="6" fill="white"/>
      <!-- Smile -->
      <path d="M240,310 Q258,324 276,310" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
      <!-- Moon -->
      <circle cx="374" cy="158" r="54" fill="url(#moon-f)"/>
      <circle cx="374" cy="158" r="54" fill="url(#moon-spec)"/>
      <!-- Moon eyes -->
      <circle cx="362" cy="152" r="10" fill="white"/>
      <circle cx="359" cy="154" r="5" fill="#12202e"/>
      <circle cx="358" cy="152" r="2.2" fill="white"/>
      <circle cx="388" cy="150" r="10" fill="white"/>
      <circle cx="385" cy="152" r="5" fill="#12202e"/>
      <circle cx="384" cy="150" r="2.2" fill="white"/>
    </g>
  </g>

  <!-- σῶμα in Greek — subtle, above the main text -->
  <text x="640" y="470" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#7cb2d4" opacity="0.5" letter-spacing="8">σ ῶ μ α</text>

  <!-- Main text -->
  <text x="640" y="530" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="700" fill="white">Soma</text>
  <text x="640" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#7cb2d4" opacity="0.7">the body that grows</text>
</svg>
