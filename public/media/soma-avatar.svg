<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Rich background -->
    <radialGradient id="bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#1e2d48"/>
      <stop offset="70%" stop-color="#131c2e"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </radialGradient>
    
    <!-- Soft glow behind mascot -->
    <radialGradient id="aura" cx="50%" cy="46%" r="35%">
      <stop offset="0%" stop-color="#6898be" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#5282a8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3e6c92" stop-opacity="0"/>
    </radialGradient>

    <!-- Mascot gradients -->
    <radialGradient id="body" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#6898be"/>
      <stop offset="50%" stop-color="#5282a8"/>
      <stop offset="100%" stop-color="#3e6c92"/>
    </radialGradient>
    <radialGradient id="spec" cx="28%" cy="24%" r="16%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-f" cx="36%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#7cb2d4"/>
      <stop offset="50%" stop-color="#669cc0"/>
      <stop offset="100%" stop-color="#5086aa"/>
    </radialGradient>
    <radialGradient id="moon-spec" cx="28%" cy="24%" r="18%">
      <stop offset="0%" stop-color="white" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a4a6a" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="#2a4a6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2a4a6a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="arm" cx="36%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#5888ae"/>
      <stop offset="100%" stop-color="#3e688c"/>
    </radialGradient>
    <radialGradient id="leg" cx="40%" cy="32%" r="54%">
      <stop offset="0%" stop-color="#5282a4"/>
      <stop offset="100%" stop-color="#3c6e8e"/>
    </radialGradient>

    <!-- Rounded square clip (GitHub renders circle, but square upload looks good too) -->
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="128" ry="128"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    
    <!-- Stars -->
    <circle cx="140" cy="120" r="2" fill="white" opacity="0.35"/>
    <circle cx="280" cy="80" r="1.5" fill="white" opacity="0.25"/>
    <circle cx="820" cy="150" r="2.2" fill="white" opacity="0.3"/>
    <circle cx="900" cy="90" r="1.5" fill="white" opacity="0.2"/>
    <circle cx="680" cy="60" r="1.8" fill="white" opacity="0.25"/>
    <circle cx="100" cy="300" r="1.5" fill="white" opacity="0.2"/>
    <circle cx="950" cy="350" r="1.8" fill="white" opacity="0.15"/>
    <circle cx="80" cy="700" r="1.5" fill="white" opacity="0.2"/>
    <circle cx="180" cy="900" r="2" fill="white" opacity="0.25"/>
    <circle cx="850" cy="850" r="1.8" fill="white" opacity="0.2"/>
    <circle cx="750" cy="950" r="1.5" fill="white" opacity="0.15"/>
    <circle cx="400" cy="950" r="2" fill="white" opacity="0.2"/>
    <circle cx="550" cy="920" r="1.2" fill="white" opacity="0.15"/>
    <circle cx="950" cy="600" r="1.5" fill="white" opacity="0.18"/>
    <circle cx="60" cy="500" r="1.8" fill="white" opacity="0.15"/>

    <!-- Aura glow -->
    <ellipse cx="512" cy="440" rx="380" ry="360" fill="url(#aura)"/>

    <!-- Mascot — φ proportions: body center at 0.382 height, scale fills ~85% width -->
    <g transform="translate(505, 400) scale(1.92)">
      <g transform="translate(-256, -280)">
        <!-- Legs -->
        <rect x="214" y="414" width="24" height="36" rx="12" fill="url(#leg)"/>
        <rect x="276" y="414" width="24" height="36" rx="12" fill="url(#leg)"/>
        <ellipse cx="226" cy="452" rx="18" ry="10" fill="#3c6e8e"/>
        <ellipse cx="288" cy="452" rx="18" ry="10" fill="#3c6e8e"/>
        <!-- Arms -->
        <circle cx="106" cy="284" r="34" fill="url(#arm)"/>
        <circle cx="406" cy="284" r="34" fill="url(#arm)"/>
        <!-- Planet body -->
        <circle cx="256" cy="280" r="148" fill="url(#body)"/>
        <circle cx="256" cy="280" r="148" fill="url(#spec)"/>
        <!-- Moon shadow on planet -->
        <ellipse cx="348" cy="186" rx="32" ry="28" fill="url(#moon-shd)" transform="rotate(15 348 186)"/>
        <!-- Eyes -->
        <circle cx="218" cy="262" r="28" fill="white"/>
        <circle cx="224" cy="258" r="14" fill="#12202e"/>
        <circle cx="230" cy="252" r="6" fill="white"/>
        <circle cx="294" cy="260" r="28" fill="white"/>
        <circle cx="300" cy="256" r="14" fill="#12202e"/>
        <circle cx="306" cy="250" r="6" fill="white"/>
        <!-- Smile -->
        <path d="M240,310 Q258,324 276,310" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
        <!-- Moon -->
        <circle cx="374" cy="158" r="54" fill="url(#moon-f)"/>
        <circle cx="374" cy="158" r="54" fill="url(#moon-spec)"/>
        <!-- Moon eyes -->
        <circle cx="362" cy="152" r="10" fill="white"/>
        <circle cx="359" cy="154" r="5" fill="#12202e"/>
        <circle cx="358" cy="152" r="2.2" fill="white"/>
        <circle cx="388" cy="150" r="10" fill="white"/>
        <circle cx="385" cy="152" r="5" fill="#12202e"/>
        <circle cx="384" cy="150" r="2.2" fill="white"/>
      </g>
    </g>

    <!-- σῶμα — golden ratio position from bottom edge -->
    <text x="512" y="940" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="68" fill="#7cb2d4" opacity="0.45" letter-spacing="16">σ ῶ μ α</text>
  </g>
</svg>
