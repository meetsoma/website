<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Inter', 'SF Pro', system-ui, sans-serif">
  <defs>
    <linearGradient id="cacheBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="cacheActive" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="cacheMiss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#cacheBg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e5e5e5" font-size="16" font-weight="600">The 5-Minute Cache TTL — What Happens When You Walk Away</text>

  <!-- Timeline axis -->
  <line x1="60" y1="300" x2="740" y2="300" stroke="#333" stroke-width="2"/>

  <!-- Time labels -->
  <text x="80" y="325" text-anchor="middle" fill="#888" font-size="11">0 min</text>
  <text x="190" y="325" text-anchor="middle" fill="#888" font-size="11">2 min</text>
  <text x="300" y="325" text-anchor="middle" fill="#888" font-size="11">5 min</text>
  <text x="410" y="325" text-anchor="middle" fill="#888" font-size="11">8 min</text>
  <text x="520" y="325" text-anchor="middle" fill="#888" font-size="11">11 min</text>
  <text x="630" y="325" text-anchor="middle" fill="#888" font-size="11">13 min</text>
  <text x="720" y="325" text-anchor="middle" fill="#888" font-size="11">15 min</text>

  <!-- Cache bar segments — active (green) -->
  <rect x="80" y="220" width="220" height="60" rx="4" fill="url(#cacheActive)" opacity="0.85"/>
  <text x="190" y="255" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Cache Active</text>
  <text x="190" y="272" text-anchor="middle" fill="#fff" font-size="10" opacity="0.7">90% discount on prompt</text>

  <!-- Expiry zone (red flash) -->
  <rect x="300" y="220" width="8" height="60" rx="2" fill="url(#cacheMiss)" opacity="0.9"/>
  <text x="304" y="210" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="600">💥 EXPIRED</text>

  <!-- Dead zone (dark) -->
  <rect x="308" y="220" width="102" height="60" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="359" y="250" text-anchor="middle" fill="#666" font-size="11">No cache</text>
  <text x="359" y="265" text-anchor="middle" fill="#555" font-size="10">☕ Getting coffee</text>

  <!-- Next message — full rebuild (red) -->
  <rect x="410" y="140" width="220" height="140" rx="4" fill="url(#cacheMiss)" opacity="0.15"/>
  <rect x="410" y="220" width="220" height="60" rx="4" fill="url(#cacheMiss)" opacity="0.6"/>
  <text x="520" y="248" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Full Cache Rebuild</text>
  <text x="520" y="265" text-anchor="middle" fill="#fca5a5" font-size="10">You pay full price again</text>

  <!-- Cost spike arrow -->
  <line x1="520" y1="215" x2="520" y2="150" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="520" y="143" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="600">Cost Spike: 10×</text>
  <text x="520" y="160" text-anchor="middle" fill="#fca5a5" font-size="10">150k tokens × $3/MTok = $0.45</text>

  <!-- Second active period -->
  <rect x="630" y="220" width="90" height="60" rx="4" fill="url(#cacheActive)" opacity="0.85"/>
  <text x="675" y="255" text-anchor="middle" fill="#fff" font-size="11" font-weight="500">Cached again</text>

  <!-- Annotations -->
  <text x="190" y="195" text-anchor="middle" fill="#4ade80" font-size="11">← You're working →</text>
  <text x="359" y="195" text-anchor="middle" fill="#888" font-size="11">← Idle →</text>
  <text x="520" y="195" text-anchor="middle" fill="#fca5a5" font-size="11">← Back to work →</text>

  <!-- Legend -->
  <rect x="80" y="355" width="14" height="14" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="100" y="367" fill="#888" font-size="11">Cached (cheap)</text>
  <rect x="220" y="355" width="14" height="14" rx="3" fill="#ef4444" opacity="0.6"/>
  <text x="240" y="367" fill="#888" font-size="11">Cache miss (10× cost)</text>
  <rect x="400" y="355" width="14" height="14" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="420" y="367" fill="#888" font-size="11">No cache (idle)</text>
</svg>