<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Inter', 'SF Pro', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
  </defs>

  <rect width="800" height="440" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e5e5e5" font-size="16" font-weight="600">Static Prompt vs Soma's Dynamic Prompt</text>

  <!-- LEFT: Static prompt (typical agent) -->
  <g transform="translate(60, 60)">
    <text x="150" y="15" text-anchor="middle" fill="#999" font-size="13" font-weight="600">Typical AI Agent</text>

    <!-- Prompt stack -->
    <rect x="20" y="30" width="260" height="40" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="150" y="55" text-anchor="middle" fill="#93c5fd" font-size="11">System prompt (fixed) — 8k tokens</text>

    <rect x="20" y="75" width="260" height="35" rx="4" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="150" y="97" text-anchor="middle" fill="#c4b5fd" font-size="11">CLAUDE.md — 4k tokens</text>

    <rect x="20" y="115" width="260" height="35" rx="4" fill="#a855f7" opacity="0.25" stroke="#a855f7" stroke-width="1" stroke-opacity="0.3"/>
    <text x="150" y="137" text-anchor="middle" fill="#d8b4fe" font-size="11">All rules loaded — 6k tokens</text>

    <rect x="20" y="155" width="260" height="35" rx="4" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1" stroke-opacity="0.3"/>
    <text x="150" y="177" text-anchor="middle" fill="#a5b4fc" font-size="11">All tools described — 5k tokens</text>

    <rect x="20" y="195" width="260" height="35" rx="4" fill="#475569" opacity="0.3" stroke="#475569" stroke-width="1" stroke-opacity="0.4"/>
    <text x="150" y="217" text-anchor="middle" fill="#94a3b8" font-size="11">Everything else — 3k tokens</text>

    <!-- Total -->
    <rect x="20" y="245" width="260" height="35" rx="6" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
    <text x="150" y="267" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="600">~26k tokens — always</text>

    <text x="150" y="300" text-anchor="middle" fill="#666" font-size="10">Same size whether you need it or not.</text>
    <text x="150" y="315" text-anchor="middle" fill="#666" font-size="10">Every cache miss rebuilds all 26k.</text>
  </g>

  <!-- RIGHT: Soma dynamic prompt -->
  <g transform="translate(440, 60)">
    <text x="150" y="15" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">Soma (Dynamic)</text>

    <!-- Core (always loaded, small) -->
    <rect x="20" y="30" width="260" height="30" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4"/>
    <text x="150" y="50" text-anchor="middle" fill="#93c5fd" font-size="11">Identity + voice — 3k tokens</text>

    <!-- Hot (full body, pulsing) -->
    <rect x="20" y="65" width="260" height="45" rx="4" fill="#22c55e" opacity="0.25" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
    <text x="150" y="84" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="500">🔥 Hot protocols — full body</text>
    <text x="150" y="100" text-anchor="middle" fill="#4ade80" font-size="10" opacity="0.7">3 active × ~800 tok = 2.4k</text>

    <!-- Warm (TL;DR only) -->
    <rect x="20" y="115" width="260" height="35" rx="4" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1" stroke-opacity="0.3"/>
    <text x="150" y="133" text-anchor="middle" fill="#fcd34d" font-size="11">🌡 Warm — TL;DR summaries</text>
    <text x="150" y="146" text-anchor="middle" fill="#fcd34d" font-size="10" opacity="0.7">5 × ~50 tok = 250 tokens</text>

    <!-- Cold (names only) -->
    <rect x="20" y="155" width="260" height="25" rx="4" fill="#475569" opacity="0.15" stroke="#475569" stroke-width="1" stroke-opacity="0.2"/>
    <text x="150" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">❄️ Cold — just names: ~100 tokens</text>

    <!-- Skills (on demand) -->
    <rect x="20" y="185" width="260" height="25" rx="4" fill="#475569" opacity="0.1" stroke="#475569" stroke-width="1" stroke-opacity="0.15"/>
    <text x="150" y="202" text-anchor="middle" fill="#64748b" font-size="10">💤 Inactive — not loaded: 0 tokens</text>

    <!-- Total -->
    <rect x="20" y="225" width="260" height="35" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
    <text x="150" y="247" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">~5.8k tokens — adaptive</text>

    <text x="150" y="280" text-anchor="middle" fill="#666" font-size="10">Grows when you need it, shrinks when you don't.</text>
    <text x="150" y="295" text-anchor="middle" fill="#666" font-size="10">Cache misses rebuild less = cheaper.</text>
  </g>

  <!-- Savings comparison bar -->
  <rect x="100" y="370" width="600" height="50" rx="8" fill="#22c55e" opacity="0.06" stroke="#22c55e" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Static bar -->
  <rect x="130" y="382" width="260" height="12" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="395" y="392" fill="#888" font-size="10">26k tokens</text>

  <!-- Dynamic bar -->
  <rect x="130" y="400" width="58" height="12" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="195" y="410" fill="#888" font-size="10">5.8k tokens (78% smaller prompt)</text>

  <text x="590" y="400" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="600">78% less to rebuild on cache miss</text>
</svg>