<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Inter', 'SF Pro', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e5e5e5" font-size="16" font-weight="600">Daily Cost: Without vs With Keepalive</text>
  <text x="400" y="58" text-anchor="middle" fill="#888" font-size="12">Typical 6-hour workday, 150k token context, 3 coffee breaks</text>

  <!-- Y-axis -->
  <line x1="120" y1="80" x2="120" y2="340" stroke="#333" stroke-width="1"/>
  <text x="110" y="345" text-anchor="end" fill="#666" font-size="11">$0</text>
  <text x="110" y="280" text-anchor="end" fill="#666" font-size="11">$0.50</text>
  <line x1="120" y1="277" x2="680" y2="277" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="110" y="215" text-anchor="end" fill="#666" font-size="11">$1.00</text>
  <line x1="120" y1="212" x2="680" y2="212" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="110" y="150" text-anchor="end" fill="#666" font-size="11">$1.50</text>
  <line x1="120" y1="147" x2="680" y2="147" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="110" y="88" text-anchor="end" fill="#666" font-size="11">$2.00</text>
  <line x1="120" y1="85" x2="680" y2="85" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Scenario 1: Without keepalive -->
  <g transform="translate(200, 0)">
    <!-- Cache rebuild costs (3 misses × $0.45 = $1.35) -->
    <rect x="0" y="165" width="100" height="175" rx="4" fill="url(#barRed)" opacity="0.8"/>
    <!-- Normal usage ($0.30) -->
    <rect x="0" y="126" width="100" height="39" rx="0" fill="#f97316" opacity="0.6"/>

    <text x="50" y="260" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">$1.35</text>
    <text x="50" y="278" text-anchor="middle" fill="#fca5a5" font-size="10">cache rebuilds</text>
    <text x="50" y="152" text-anchor="middle" fill="#fff" font-size="10">$0.30 usage</text>

    <!-- Total -->
    <text x="50" y="115" text-anchor="middle" fill="#ef4444" font-size="18" font-weight="700">$1.65</text>
    <text x="50" y="370" text-anchor="middle" fill="#ccc" font-size="13" font-weight="500">Without Keepalive</text>
    <text x="50" y="387" text-anchor="middle" fill="#888" font-size="10">3 cache misses/day</text>
  </g>

  <!-- Scenario 2: With Soma keepalive -->
  <g transform="translate(480, 0)">
    <!-- Keepalive ping cost ($0.02) -->
    <rect x="0" y="307" width="100" height="33" rx="4" fill="url(#barGreen)" opacity="0.8"/>
    <!-- Normal usage ($0.30) -->
    <rect x="0" y="268" width="100" height="39" rx="0" fill="#4ade80" opacity="0.4"/>

    <text x="50" y="328" text-anchor="middle" fill="#fff" font-size="10">$0.02 pings</text>
    <text x="50" y="292" text-anchor="middle" fill="#fff" font-size="10">$0.30 usage</text>

    <!-- Total -->
    <text x="50" y="258" text-anchor="middle" fill="#22c55e" font-size="18" font-weight="700">$0.32</text>
    <text x="50" y="370" text-anchor="middle" fill="#ccc" font-size="13" font-weight="500">With Soma</text>
    <text x="50" y="387" text-anchor="middle" fill="#888" font-size="10">0 cache misses</text>
  </g>

  <!-- Savings callout -->
  <rect x="520" y="165" width="140" height="50" rx="8" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1" stroke-opacity="0.3"/>
  <text x="590" y="186" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="600">Save 80%</text>
  <text x="590" y="204" text-anchor="middle" fill="#4ade80" font-size="11">$1.33/day</text>

  <!-- Legend -->
  <rect x="140" y="400" width="12" height="12" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="158" y="411" fill="#888" font-size="10">Cache rebuild cost</text>
  <rect x="300" y="400" width="12" height="12" rx="3" fill="#f97316" opacity="0.6"/>
  <text x="318" y="411" fill="#888" font-size="10">Normal usage</text>
  <rect x="440" y="400" width="12" height="12" rx="3" fill="#22c55e" opacity="0.8"/>
  <text x="458" y="411" fill="#888" font-size="10">Keepalive pings</text>
</svg>